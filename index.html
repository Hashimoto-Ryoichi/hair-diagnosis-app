// 動的表示レイヤー（typeKeyは内部維持。一部タイプは回答内容で補助的に sub のみ切替）
function getDisplayTitle(typeKey,answers){
  return (TYPES[typeKey]&&TYPES[typeKey].title)||"";
}
function getDisplaySub(typeKey,answers){
  if(typeKey==="smooth_wave"){
    const q5arr=Array.isArray(answers.q5)?answers.q5:(answers.q5?[answers.q5]:[]);
    if(q5arr.includes("birth")&&answers.q6==="none") return "出産後の変化が気になる髪";
    return TYPES[typeKey].sub;
  }
  if(typeKey==="bare_skin"){
    const q7arr=Array.isArray(answers.q7)?answers.q7:(answers.q7?[answers.q7]:[]);
    if(!q7arr.some(v=>v==="color"||v==="bleach"||v==="perm"||v==="straight"))
      return "健康な髪・軽めのナチュラルケア";
    return TYPES[typeKey].sub;
  }
  if(typeKey==="repair_mode"){
    const q7arr=Array.isArray(answers.q7)?answers.q7:(answers.q7?[answers.q7]:[]);
    if(q7arr.includes("perm")&&!q7arr.includes("straight")&&!q7arr.includes("bleach"))
      return "パーマ × カール維持ケア";
    // 強薬剤（ブリーチ・縮毛矯正・パーマ）なしでRepair Modeになった場合、「ハイダメージ」表記は実態と合わないため切替
    if(!q7arr.some(v=>v==="bleach"||v==="straight"||v==="perm"))
      return q7arr.includes("color")?"カラーダメージ集中補修":"熱・乾燥ダメージ集中補修";
    return TYPES[typeKey].sub;
  }
  return (TYPES[typeKey]&&TYPES[typeKey].sub)||"";
}
function getDisplayCharImg(typeKey,answers){
  return CHAR_IMG[typeKey];
}
function getDisplayBadge(typeKey,answers){
  return (TYPES[typeKey]&&TYPES[typeKey].badge)||"";
}
function getDisplayAdvice(typeKey,answers){
  // repair_mode: 強薬剤なし → 先頭の薬剤ダメージ解説を実態（カラー／熱・摩擦）に合わせて差し替え
  if(typeKey==="repair_mode"){
    const q7arr=Array.isArray(answers.q7)?answers.q7:(answers.q7?[answers.q7]:[]);
    if(!q7arr.some(v=>v==="bleach"||v==="straight"||v==="perm")){
      const rest=(TYPES.repair_mode.advice||[]).slice(2);
      const first=q7arr.includes("color")
        ?"カラーの薬剤も、繰り返すほど髪のタンパク質（ケラチン）を少しずつ変性させます。失ったタンパク質を補うことが修復の第一歩です。"
        :"高温のアイロン・コテや日々の摩擦・乾燥でも、髪のタンパク質は少しずつ変性してダメージが蓄積します。失ったタンパク質を補うことが修復の第一歩です。";
      return [first,"ケラチンやアミノ酸などの補修成分が配合されたシャンプーなら、髪の内部に栄養を補いながら優しく洗えます。",...rest];
    }
  }
  // bare_skin: 薬剤なし（colorを含まない）→ 健康な髪向けアドバイスに切替
  if(typeKey==="bare_skin"){
    const q7arr=Array.isArray(answers.q7)?answers.q7:(answers.q7?[answers.q7]:[]);
    if(!q7arr.includes("color")){
      return [
        "健康な髪・バージン毛は、過度なケアをしすぎないことが大切。洗浄力が強すぎるシャンプーで必要な皮脂まで落としてしまうと、逆に乾燥が進みます。",
        "アミノ酸系・ベタイン系のマイルドな洗浄成分を選ぶと、髪と頭皮を優しく洗いながら適度な潤いを残してくれます。",
        "週に1〜2回の頭皮マッサージで血行が促進され、健康な髪の成長をサポートします。洗髪時の1〜2分が効果的。",
        "※ 詳しくは担当の美容師さんに相談しながら、ご自身の髪質に合ったケアを確認してみてください。"
      ];
    }
  }
  return (TYPES[typeKey]&&TYPES[typeKey].advice)||[];
}

// 回答から「求める成分プロファイル」を算出する（Top Pick判定の中核）
function desiredProfile(answers){
  const arr=k=>{const v=answers[k];return Array.isArray(v)?v:(v?[v]:[]);};
  const q7=arr("q7"),q8=arr("q8"),q10=arr("q10"),q11=arr("q11");
  // 洗浄力の要求値: 頭皮状態で決まる
  let wash=3;
  if(answers.q1==="oily")wash=4.2;
  else if(answers.q1==="mix")wash=3.4;
  else if(answers.q1==="normal")wash=2.8;
  else if(answers.q1==="dry")wash=2;
  else if(answers.q1==="red")wash=1.8;
  // 低刺激性の要求値: 敏感・乾燥ほど高い
  let mild=3;
  if(answers.q1==="red")mild=5;
  else if(answers.q1==="dry")mild=4.2;
  else if(answers.q1==="mix")mild=3.4;
  // 補修力の要求値: 薬剤履歴＋ダメージ実感
  let repair=1.5;
  if(q7.includes("bleach"))repair+=2;
  else if(q7.includes("straight")||q7.includes("perm"))repair+=1.5;
  else if(q7.includes("color"))repair+=1;
  const dmg=q8.filter(t=>["dry","split","frizz","spread"].includes(t)).length;
  repair+=Math.min(1.5,dmg*0.7);
  if(repair>5)repair=5;
  // 仕上がりの重さの要求値: なりたい髪質（第一希望を優先）
  let moist=2.8;
  const q10first=q10[0];
  if(q10first==="moist")moist=4.2;
  else if(q10first==="gloss")moist=3.2;
  else if(q10first==="smooth")moist=2.4;
  else if(q10first==="volume")moist=1.8;
  else if(q10first==="vdown")moist=3.6;
  if(q11.includes("volume")||answers.q4==="less")moist=Math.min(moist,2);
  // 特化機能の要求: 悩み・頭皮状態から
  const focus=[];
  if(q11.includes("oily")||answers.q1==="oily")focus.push("scalp","odor","cool");
  if(q11.includes("dry")||answers.q1==="dry")focus.push("moisture","dryscalp");
  if(answers.q1==="red")focus.push("sensitive","fungal");
  if(answers.q1==="dry")focus.push("sensitive");
  if(q11.includes("repair")||q7.includes("bleach"))focus.push("repair");
  if(q11.includes("wave")||arr("q6").some(v=>v==="some"||v==="strong"))focus.push("curl");
  if(q11.includes("aging")||q11.includes("gray"))focus.push("aging");
  if(q11.includes("volume")||q10.includes("volume")||q8.includes("flat"))focus.push("volume");
  if(q10.includes("gloss"))focus.push("gloss");
  if(q10.includes("smooth"))focus.push("light");
  if(q10.includes("moist"))focus.push("moisture");
  return{wash,mild,moist,repair,focus};
}

// 商品の表示可否ルール（タイプ別主リスト・界面活性剤チャートで共通利用）
function isSummerSeason(){const m=new Date().getMonth()+1;return m>=5&&m<=10;}
function isProductDisplayable(p,answers){
  if(p.name.includes("イオ クレンジング")&&answers.q1!=="dry") return false;
  if(p.summerOnly&&!isSummerSeason()) return false;
  if(p.q1Allow&&!p.q1Allow.includes(answers.q1)) return false;
  if(p.curlAvoid){
    const q7arr=Array.isArray(answers.q7)?answers.q7:(answers.q7?[answers.q7]:[]);
    if(q7arr.includes("perm")&&!q7arr.includes("straight")) return false;
  }
  return true;
}

function scoreProduct(product,answers){
  let s=0;
  // ① 成分プロファイル一致（軸ごとに要求値との距離で加点。最大8点＋特化最大3点）
  const want=desiredProfile(answers);
  const ing=ING_PROFILES.find(m=>product.name.includes(m.key));
  if(ing){
    s+=2-Math.min(2,Math.abs(want.wash-ing.w));
    s+=2-Math.min(2,Math.abs(want.mild-ing.m));
    s+=2-Math.min(2,Math.abs(want.moist-ing.o));
    s+=2-Math.min(2,Math.abs(want.repair-ing.r));
    if(want.focus.includes(ing.f)) s+=ing.fl*0.6;
    // 安全ルール: 敏感・乾燥頭皮(Q1=red/dry)に洗浄力4以上の商品は大幅減点
    if((answers.q1==="red"||answers.q1==="dry")&&ing.w>=4) s-=3;
  }
  // ② 既存タグによる微調整（商品固有の相性）
  const entry=MATCH_TAGS.find(m=>product.name.includes(m.key));
  if(entry){
    for(const q in entry.tags){
      if(q==="q7"){
        const q7arr=Array.isArray(answers.q7)?answers.q7:[answers.q7||"none"];
        if(entry.tags.q7.some(t=>q7arr.includes(t))) s++;
      } else if(q==="q8"){
        const q8arr=Array.isArray(answers.q8)?answers.q8:[answers.q8].filter(Boolean);
        if(q8arr.length>0&&entry.tags.q8.includes(q8arr[0])) s+=2;
        else if(q8arr.some(t=>entry.tags.q8.includes(t))) s++;
      } else if(q==="q10"){
        const q10arr=Array.isArray(answers.q10)?answers.q10:[answers.q10].filter(Boolean);
        if(q10arr.length>0&&entry.tags.q10.includes(q10arr[0])) s+=2;
        else if(q10arr.some(t=>entry.tags.q10.includes(t))) s++;
      } else {
        const val=answers[q];
        const vals=Array.isArray(val)?val:(val?[val]:[]);
        if(vals.some(v=>entry.tags[q].includes(v))) s++;
      }
    }
  }
  // heavyMoisture: ボリューム志望者には重く感じやすい保湿系商品を減点
  if(product.heavyMoisture){
    const q11arr=Array.isArray(answers.q11)?answers.q11:(answers.q11?[answers.q11]:[]);
    const q10arr=Array.isArray(answers.q10)?answers.q10:(answers.q10?[answers.q10]:[]);
    if(q11arr.includes("volume")||q10arr.includes("volume")||answers.q4==="less"){
      s-=2;
    }
  }
  // volumeUp: ボリュームを抑えたい・毛量多いユーザーにはボリュームアップ訴求商品を減点
  if(product.volumeUp){
    const q10arr=Array.isArray(answers.q10)?answers.q10:(answers.q10?[answers.q10]:[]);
    if(q10arr.includes("vdown")||answers.q4==="more"){
      s-=2;
    }
  }
  // top: キュレーター定番ボーナス（+1。同点時の決め手。主導権は成分プロファイル一致が持つ）
  if(product.top){
    s+=1;
  }
  return Math.round(s*10)/10;
}

function diagnose(ans){
  const {q1,q2,q3,q4,q6}=ans;
  // Q11は複数選択配列。先頭（最初に押した=最重視）を主回答として使用
  const q11arr=Array.isArray(ans.q11)?ans.q11:(ans.q11?[ans.q11]:[]);
  const q11=q11arr[0]||"none";
  // Q9は複数選択配列。高機能器具が1つでも含まれればgoodTool=true
  const q9arr=Array.isArray(ans.q9)?ans.q9:[ans.q9||"none"];

  // Q5は複数選択配列。組み合わせで優先度を決定
  const q5arr=Array.isArray(ans.q5)?ans.q5:[ans.q5||"stable"];
  const hasBirth=q5arr.includes("birth");
  const hasClear=q5arr.includes("clear");
  const hasStrong=q5arr.includes("strong");
  const eq5=hasStrong?"strong":hasClear?"clear":hasBirth?"birth":q5arr.includes("early")?"early":q5arr.includes("young")?"young":"stable";

  // Q7は複数選択配列。最強ダメージを1つ抽出して診断に使う
  const Q7_PRIORITY=["bleach","straight","perm","color","none"];
  const q7arr=Array.isArray(ans.q7)?ans.q7:[ans.q7||"none"];
  const eq7=Q7_PRIORITY.find(p=>q7arr.includes(p))||"none";

  // Q8は複数選択配列。深刻度優先で主回答を決定（タップ順依存を排除）
  // 優先度：チリつき/枝毛 > 広がり/パサつき > ぺたんこ > ツヤあり
  const Q8_PRIORITY=["frizz","split","spread","dry","flat","gloss"];
  const q8arr=Array.isArray(ans.q8)?ans.q8:(ans.q8?[ans.q8]:[]);
  const q8=Q8_PRIORITY.find(v=>q8arr.includes(v))||q8arr[0];

  // Q10は複数選択配列。先頭（最初に押した=最重視）を主回答として使用
  const q10arr=Array.isArray(ans.q10)?ans.q10:(ans.q10?[ans.q10]:[]);
  const q10=q10arr[0];

  // ── Step1: 頭皮トラブル ────────────────────────────
  if(q1==="red") return "skin_alert";

  // ── Step1.5: Q11「補修」を最優先 × 深刻ダメージサイン → Repair Mode を最初に確定 ──
  // （以降の脂性・くせ毛・bare_skin 等の分岐で吸い取られるのを防ぐ）
  if(q11arr.includes("repair")&&q8arr.some(v=>v==="split"||v==="frizz"||v==="spread")){
    return "repair_mode";
  }

  // ── Step1.6: Q11「ベタつき」主訴 → Oil Reset を前倒し（薬剤ブリーチ/縮毛矯正は除外）──
  // 太毛/多毛で smooth_wave に流れるのを防ぐ
  if(q11arr.includes("oily")&&eq7!=="bleach"&&eq7!=="straight"&&eq7!=="perm"){
    return q2==="short"?"oil_reset_short":"oil_reset_long";
  }

  // ── Step2: 脂性頭皮（薬剤なし or カラーのみ）→ Oil Reset ─────────
  if(q1==="oily"&&(eq7==="none"||eq7==="color")) return q2==="short"?"oil_reset_short":"oil_reset_long";

  // ── Step3: 薬剤ダメージ（年齢より優先。ブリーチ・縮毛矯正・パーマは緊急度高）──────
  // 全体ブリーチ・インナーカラー
  // ショート：毛先ダメージ（パサつき・チリつき・枝毛・広がり）があればRepair、なければBare Skin
  // ミディアム以上：Repair確定
  if(eq7==="bleach"){
    if(q2==="short"){
      const hasEndDmg=q8arr.some(v=>v==="dry"||v==="frizz"||v==="split"||v==="spread");
      return hasEndDmg?"repair_mode":"bare_skin";
    }
    return "repair_mode";
  }
  // 縮毛矯正 → トステア配合 Repair Mode（直毛として S-S 再結合させる前提）
  if(eq7==="straight") return "repair_mode";
  // パーマ → Repair Mode（補修＋カール維持。ストレート訴求の curlAvoid 商品は isProductDisplayable で除外）
  if(eq7==="perm") return "repair_mode";
  // カラー + 深刻ダメージサイン（チリつき・枝毛のみ）→ Q9で分岐
  // 広がり(spread)は髪質由来が多く、カラーのみでハイダメージ扱いは過剰なため除外 → Step5のSmooth Waveで受ける
  // 高機能器具（リファ・ビューロン・レプロナイザー・ナノイー）でダメージ軽減 → Bare Skin
  // 普通器具・使わない → Repair Mode（補修強め）
  if(eq7==="color"&&(q8==="split"||q8==="frizz")){
    // 高機能熱器具（refa/bio/repro/nanoe）を主に使う場合のみダメージ軽減効果を期待
    // "other"（その他のドライヤー・アイロン）併用時は使用頻度が分散している可能性が高く保守的に repair_mode へ
    const goodTool=q9arr.some(v=>v==="refa"||v==="bio"||v==="repro"||v==="nanoe")&&!q9arr.includes("other");
    return goodTool?"bare_skin":"repair_mode";
  }

  // ── Step4: 60代以降で強く実感 → Vital Aging（薬剤ダメージ判定の後で確定）──
  if(eq5==="strong") return "vital_aging";

  // ── Step4.5: Q11 主訴（第一タップ）がエイジングサイン（aging/gray）→ Vital Aging ──
  // 2番目以降のタップは Q5=50代以降の実感（clear/strong）がある場合のみエイジング系へ。
  // 白髪・エイジングの副次タップだけでは、くせ毛等の主訴を上書きしない
  // （染色不可の注記・商品スコア加点は従来通り機能する）
  // 細毛・少毛量・ボリュームほしい併発時は Volume Grace に振り直し
  const agingMain=q11arr[0]==="aging"||q11arr[0]==="gray";
  const agingWithAge=(q11arr.includes("aging")||q11arr.includes("gray"))&&(hasClear||hasStrong);
  if(agingMain||agingWithAge){
    const isThinSoft=ans.q3==="thin"||ans.q4==="less";
    const wantVol=q10arr.includes("volume");
    // ボリュームダウンが第一希望の人を、細毛だけを理由にボリュームケアへ振らない（回答を尊重）
    return (wantVol||(isThinSoft&&q10arr[0]!=="vdown"))?"volume_grace":"vital_aging";
  }

  // ── Step5: くせ毛・うねりが主訴 ──────────────────────
  const hasKuse=q6==="some"||q6==="strong";
  const hasSpread=q8==="spread";
  const wantVolume=q10==="volume";

  // 「ボリュームが欲しい」回答はQ10でもQ11でも尊重（頭頂部だけぺたんこの接客例）。ただしQ10第一希望がvdownなら抑える方を優先
  const wantVolAny=wantVolume||(q11arr.includes("volume")&&q10!=="vdown");

  if(hasKuse||hasSpread){
    // ボリューム志望が併発するとaqua_sensitiveでは弱い → Volume Grace に
    if(wantVolAny) return "volume_grace";
    return "smooth_wave";
  }

  // 出産後の髪変化（フォールバック）→ うねり由来として Smooth Wave（ボリューム希望があればVolume Grace）
  // 主訴がエイジング・くせ毛・薬剤ダメージ等に該当しない場合のみ適用
  if(hasBirth&&q8!=="split"&&q8!=="frizz"&&!q11arr.includes("repair")) return wantVolAny?"volume_grace":"smooth_wave";

  // ── Step6: Q8 現在の髪の状態 ─────────────────────────
  if(q8==="frizz"||q8==="split"){
    return "bare_skin";
  }
  if(q8==="flat"){
    // ぺたんとしてボリュームが出ない × ボリューム志向 → Volume Grace（細毛・ボリューム不足ケア）
    const isThinSoftEarly=(q3==="thin"||q4==="less");
    if(isThinSoftEarly&&(wantVolume||q11arr.includes("volume"))) return "volume_grace";
    // 50代から実感 × ぺたんこ × ボリューム志向 → Vital Aging
    if(hasClear&&(wantVolume||q11arr.includes("volume"))) return "vital_aging";
    if(wantVolume) return "volume_grace";
    return eq7==="none"?"aqua_sensitive":"bare_skin";
  }

  // ── Step7: Q3 太さ × Q4 毛量 ─────────────────────────
  const isThickHard=(q3==="thick"||q4==="more");
  const isThinSoft =(q3==="thin"||q4==="less");

  if(isThickHard){
    if(q10==="vdown") return "smooth_wave";
    // 太毛・多毛でも「ボリュームが欲しい」回答があれば尊重（頭頂部だけボリュームが出ない接客例）
    if(wantVolAny) return hasClear?"vital_aging":"volume_grace";
    if(q10==="moist") return "smooth_wave";
    if(q8==="dry"&&eq7==="color") return "bare_skin";
    return "smooth_wave";
  }
  if(isThinSoft){
    // 細毛・少毛量＋ボリューム志向 → Volume Grace（年齢非依存のボリュームケア）
    // ただし50代から実感ありの場合は Vital Aging（エイジングサイン優先）
    if(wantVolume||q11arr.includes("volume")){
      return hasClear?"vital_aging":"volume_grace";
    }
    // ショート×1年以内薬剤なしは伸長（月1〜1.2cm）的にほぼ新生毛 → バージン毛ケア確定
    // ミディアム以上は毛先に1年以上前の既染部が残る可能性 → パサつきがあれば Bare Skin
    if(eq7==="none"&&(q2==="short"||q8==="gloss")) return "aqua_sensitive";
    return "bare_skin";
  }

  // ── Step8: Q11 悩みで最終決定 ────────────────────────
  if(q11==="wave"){
    return wantVolAny?"volume_grace":"smooth_wave";
  }
  if(q11==="repair"){
    // 自覚あり + Q8深刻ダメージサイン → Repair Mode、それ以外 Bare Skin
    if(q8==="split"||q8==="frizz"||q8==="spread") return "repair_mode";
    return "bare_skin";
  }
  if(q11==="aging") return "vital_aging";
  if(q11==="volume"){
    // ボリュームが欲しい：細毛・少毛量は年齢関係なく Volume Grace（50代からの実感ありなら Vital Aging）
    if(isThinSoft) return hasClear?"vital_aging":"volume_grace";
    return hasClear?"vital_aging":"volume_grace";
  }

  // ── Step9: Q10 なりたい髪質を最終反映 ───────────────
  if(q10==="volume"){
    return hasClear?"vital_aging":"volume_grace";
  }
  if(q10==="vdown") return "smooth_wave";

  // ── Step10: デフォルト ─────────────────────────────
  // パサつきありの場合、新生毛と判断できるのはショート×薬剤なしのみ（ミディアム以上は毛先既染部の可能性 → Bare Skin）
  if(eq7==="none"&&(q8==="gloss"||(q8==="dry"&&q2==="short"))) return "aqua_sensitive";
  return "bare_skin";
}

      const noWaveInput=q6==="none"&&!q8arr.includes("spread")&&!q11arr.includes("wave");

      // パーマ単独（縮毛矯正なし）→ カール維持優先、熱反応で直毛化するリスクのある unu は避け、保湿バランス型を推奨
      const isPermOnly = q7arr.includes("perm") && !q7arr.includes("straight");
      if(isPermOnly){
        return{label:"カール・うねりを活かしたい場合は",desc:"頭皮ケアと並行して、保湿と軽補修でカールのまとまりを整えたい方へ。",products:[findP("smooth_wave","コスメデコルテ"),findP("repair_mode","セラムイン")].filter(Boolean)};
      }
      return{label:"うねり・くせが気になる場合は",desc:"頭皮ケアと並行して、うねりも整えたい方へ。",products:[findP("smooth_wave","unu"),findP("repair_mode","セラムイン")].filter(Boolean)};
    }
    if(hasDamage){
      return{label:"髪のダメージが気になる場合は",desc:"頭皮ケアと並行して、低刺激でダメージ補修もしたい方へ。",products:[findP("bare_skin","ジアンサー"),findP("bare_skin","MEMEME")].filter(Boolean)};
    }
    if(hasAging){
      return{label:"ハリ・コシ・ボリュームが気になる場合は",desc:"頭皮ケアと並行して、エイジングサインにもアプローチしたい方へ。",products:[findP("vital_aging","PRORY"),findP("vital_aging","セグレタ 地肌も髪も洗える")].filter(Boolean)};
    }
    const hasAnyConcern=q11arr.some(v=>v!=="none"&&v!=="")||q8arr.some(v=>v!=="gloss");
    if(hasAnyConcern){
      return{label:"髪のうるおい・まとまりが気になる場合は",desc:"頭皮ケアと並行して、毛先のケアもしたい方へ。",products:[findP("aqua_sensitive","ジュレーム"),findP("aqua_sensitive","BOTANIST")].filter(Boolean)};
    }
  }
  return null;
}

const SCORE_AXES=["straight","wavy","dry","oily","thin","thick","damage","scalp"];
const SCORE_AXES_JA={straight:"直毛",wavy:"クセ毛",dry:"乾燥",oily:"脂性",thin:"細毛",thick:"太毛",damage:"ダメージ",scalp:"頭皮トラブル"};

function _hasAns(ans,qid,val){
  const v=ans[qid];
  if(Array.isArray(v)) return v.includes(val);
  return v===val;
}

// 8軸スコア配点（橋元メソッド準拠）
function computeScores(ans){
  const s={straight:0,wavy:0,dry:0,oily:0,thin:0,thick:0,damage:0,scalp:0};
  const log=[];
  const add=(axis,pts,q,key,reason)=>{s[axis]+=pts;log.push({q,key,axis,points:pts,reason});};
  const has=(q,k)=>_hasAns(ans,q,k);

  // Q1 頭皮
  if(has("q1","dry"))   {add("dry",30,"Q1","dry","頭皮乾燥は髪乾燥の主因");add("scalp",10,"Q1","dry","軽度の頭皮トラブル");}
  if(has("q1","oily"))  {add("oily",50,"Q1","oily","脂性頭皮の直接サイン");add("scalp",20,"Q1","oily","皮脂過多");}

  if(has("q4","more"))  {add("thick",25,"Q4","more","多毛量＝ボリューム過多");}

  // Q5 髪悩み歴（複数）

  if(has("q6","none"))  {add("straight",40,"Q6","none","直毛");}

  // Q7 薬剤（複数）
  if(has("q7","bleach"))  {add("damage",50,"Q7","bleach","ブリーチは最高ダメージ");}
  if(has("q7","straight")){add("damage",40,"Q7","straight","縮毛矯正は強ダメージ");add("straight",30,"Q7","straight","物理的に直毛化");add("wavy",-30,"Q7","straight","くせを物理除去");}
  if(has("q7","perm"))    {add("damage",35,"Q7","perm","パーマは中強ダメージ");add("wavy",20,"Q7","perm","物理的にウェーブ付与");}
  if(has("q7","color"))   {add("damage",20,"Q7","color","カラーは軽中ダメージ");}

  // Q8 ダメージ（複数）
  if(has("q8","gloss")) {add("damage",-20,"Q8","gloss","ツヤありはダメージ低い");add("straight",20,"Q8","gloss","ツヤは直毛性高い");}
  if(has("q8","dry"))   {add("dry",15,"Q8","dry","パサつきは乾燥サイン");add("damage",10,"Q8","dry","軽ダメージ");}
  if(has("q8","split")) {add("damage",20,"Q8","split","枝毛は明確なダメージ");add("dry",10,"Q8","split","乾燥併発しやすい");}
  if(has("q8","frizz")) {add("damage",15,"Q8","frizz","チリつきは中ダメージ");add("wavy",10,"Q8","frizz","くせ毛由来の場合あり");}

  if(has("q9","other")) {add("damage",5,"Q9","other","熱器具の常用は軽ダメージ要因");}

  if(has("q10","volume")){add("thin",10,"Q10","volume","ボリューム希望は細毛悩み示唆");}
  if(has("q10","vdown")) {add("thick",10,"Q10","vdown","ボリュームダウン希望は太毛悩み示唆");}

  if(has("q11","dry"))   {add("dry",20,"Q11","dry","パサつき悩み");}

  if(has("q11","aging")){add("thin",15,"Q11","aging","エイジング細毛化");add("dry",10,"Q11","aging","加齢乾燥");}

  for(const k of SCORE_AXES) s[k]=Math.max(0,Math.min(100,s[k]));
  return{scores:s,log};
}

// 矛盾検出ルール
const CONTRADICTION_RULES=[
  {id:"C1",check:a=>_hasAns(a,"q1","oily")&&_hasAns(a,"q11","dry"),penalty:15,desc:"頭皮は脂性なのにパサつき主訴（毛先乾燥の可能性はあるが数値上は矛盾）"},
  {id:"C2",check:a=>_hasAns(a,"q6","none")&&_hasAns(a,"q10","vdown"),penalty:10,desc:"直毛なのにボリュームダウン希望（細毛×多毛で広がる場合のみ整合）"},
  {id:"C3",check:a=>_hasAns(a,"q7","none")&&(_hasAns(a,"q8","split")||_hasAns(a,"q8","frizz")),penalty:12,desc:"薬剤未経験なのに枝毛・チリつき主訴（環境ダメージ由来の可能性）"},
  {id:"C4",check:a=>_hasAns(a,"q3","thick")&&_hasAns(a,"q10","volume"),penalty:8,desc:"太毛なのにボリュームアップ希望（少毛量・ぺたんこ併発の可能性）"},
  {id:"C5",check:a=>_hasAns(a,"q1","dry")&&_hasAns(a,"q11","oily"),penalty:15,desc:"頭皮乾燥なのにベタつき悩み"},
  {id:"C6",check:a=>_hasAns(a,"q3","thin")&&_hasAns(a,"q4","more")&&_hasAns(a,"q11","volume"),penalty:5,desc:"細毛×多毛量×ボリューム希望（整合する組合せだが特異）"},
];

function detectContradictions(ans){
  const hits=[];
  let totalPenalty=0;
  for(const r of CONTRADICTION_RULES){
    if(r.check(ans)){hits.push({id:r.id,desc:r.desc,penalty:r.penalty});totalPenalty+=r.penalty;}
  }
  return{hits,totalPenalty};
}

function computeConfidence(totalPenalty){
  const raw=Math.max(40,100-totalPenalty);
  let display=95,level="high";
  if(raw<70){display=65;level="low";}
  else if(raw<85){display=80;level="mid";}
  return{raw,display,level};
}

// 診断トレース（diagnose関数のフローを post-hoc に再現）
function buildTrace(ans,typeKey){
  const trace=[];
  const q11arr=Array.isArray(ans.q11)?ans.q11:(ans.q11?[ans.q11]:[]);
  const q7arr=Array.isArray(ans.q7)?ans.q7:[ans.q7||"none"];
  const Q7_PRIORITY=["bleach","straight","perm","color","none"];
  const eq7=Q7_PRIORITY.find(p=>q7arr.includes(p))||"none";
  const q5arr=Array.isArray(ans.q5)?ans.q5:(ans.q5?[ans.q5]:[]);
  const q8arr=Array.isArray(ans.q8)?ans.q8:(ans.q8?[ans.q8]:[]);
  const q10arr=Array.isArray(ans.q10)?ans.q10:(ans.q10?[ans.q10]:[]);
  // diagnose関数と同じ優先度解決（複数選択時のズレ防止）
  const Q8_PRIORITY=["frizz","split","spread","dry","flat","gloss"];
  const q8main=Q8_PRIORITY.find(v=>q8arr.includes(v))||q8arr[0];
  const wantVolAny=q10arr[0]==="volume"||(q11arr.includes("volume")&&q10arr[0]!=="vdown");

  if(ans.q1==="red"){
    trace.push({step:"Step1",condition:"Q1=赤み・湿疹",result:"skin_alert確定",weight:"最優先"});
  }else if(q11arr.includes("repair")&&q8arr.some(v=>["split","frizz","spread"].includes(v))){
    trace.push({step:"Step1.5",condition:"Q11=ダメージ修復 ∧ Q8=深刻サイン",result:"repair_mode確定",weight:"高優先"});
  }else if(q11arr.includes("oily")&&!["bleach","straight","perm"].includes(eq7)){
    trace.push({step:"Step1.6",condition:"Q11=ベタつき ∧ 強薬剤なし",result:`oil_reset_${ans.q2==="short"?"short":"long"}確定`,weight:"高優先"});
  }else if(ans.q1==="oily"&&(eq7==="none"||eq7==="color")){
    trace.push({step:"Step2",condition:"Q1=脂性 ∧ (薬剤なし ∨ カラーのみ)",result:`oil_reset_${ans.q2==="short"?"short":"long"}確定`,weight:"中"});
  }else if(eq7==="bleach"){
    if(ans.q2==="short"){
      const hasEndDmg=q8arr.some(v=>["dry","frizz","split","spread"].includes(v));
      trace.push({step:"Step3",condition:`Q7=ブリーチ ∧ ショート ∧ 毛先ダメージ${hasEndDmg?"あり":"なし"}`,result:`${hasEndDmg?"repair_mode":"bare_skin"}確定`,weight:"高"});
    }else{
      trace.push({step:"Step3",condition:"Q7=ブリーチ ∧ ミディアム以上",result:"repair_mode確定",weight:"高"});
    }
  }else if(eq7==="straight"){
    trace.push({step:"Step3",condition:"Q7=縮毛矯正",result:"repair_mode確定",weight:"高"});
  }else if(eq7==="perm"){
    trace.push({step:"Step3",condition:"Q7=パーマ",result:"repair_mode確定",weight:"高"});
  }else if(eq7==="color"&&q8arr.some(v=>["split","frizz"].includes(v))){
    const q9arr=Array.isArray(ans.q9)?ans.q9:[ans.q9||"none"];
    const goodTool=q9arr.some(v=>["refa","bio","repro","nanoe"].includes(v))&&!q9arr.includes("other");
    trace.push({step:"Step3",condition:`Q7=カラー ∧ 深刻ダメージ ∧ 高機能器具=${goodTool?"あり":"なし"}`,result:`${goodTool?"bare_skin":"repair_mode"}確定`,weight:"中高"});
  }else if(q5arr.includes("strong")&&typeKey==="vital_aging"){
    trace.push({step:"Step4",condition:"Q5=60代以降強く実感",result:"vital_aging確定",weight:"中"});
  }else if((q11arr[0]==="aging"||q11arr[0]==="gray")||((q11arr.includes("aging")||q11arr.includes("gray"))&&(q5arr.includes("clear")||q5arr.includes("strong")))){
    const isThinSoft=ans.q3==="thin"||ans.q4==="less";
    const wantVol=q10arr.includes("volume");
    const agingMain=q11arr[0]==="aging"||q11arr[0]==="gray";
    trace.push({step:"Step4.5",condition:`Q11=エイジング/白髪（${agingMain?"主訴":"Q5=50代以降実感"}） ∧ 細毛=${isThinSoft} ∧ ボリューム希望=${wantVol}`,result:`${(wantVol||(isThinSoft&&q10arr[0]!=="vdown"))?"volume_grace":"vital_aging"}確定`,weight:"中"});
  }else if(ans.q6==="some"||ans.q6==="strong"||q8main==="spread"){
    trace.push({step:"Step5",condition:`くせ毛/広がり ∧ ボリューム希望=${wantVolAny}`,result:`${wantVolAny?"volume_grace":"smooth_wave"}確定`,weight:"中"});
  }else if(q5arr.includes("birth")&&q8main!=="split"&&q8main!=="frizz"&&!q11arr.includes("repair")){
    trace.push({step:"Step5.5",condition:`出産後の髪変化（フォールバック）∧ ボリューム希望=${wantVolAny}`,result:`${wantVolAny?"volume_grace":"smooth_wave"}確定`,weight:"中"});
  }else if(q8main==="frizz"||q8main==="split"){
    trace.push({step:"Step6",condition:"Q8=チリつき/枝毛",result:"bare_skin確定",weight:"低中"});
  }else if(q8main==="flat"){
    trace.push({step:"Step6",condition:"Q8=ぺたんこ",result:`${typeKey}確定`,weight:"低中"});
  }else if(ans.q3==="thick"||ans.q4==="more"){
    trace.push({step:"Step7",condition:"太毛/多毛",result:`${typeKey}確定`,weight:"低"});
  }else if(ans.q3==="thin"||ans.q4==="less"){
    trace.push({step:"Step7",condition:"細毛/少毛",result:`${typeKey}確定`,weight:"低"});
  }else{
    trace.push({step:"Step8",condition:"デフォルト",result:`${typeKey}確定`,weight:"デフォルト"});
  }
  return trace;
}

// 除外タイプの理由
const ALL_TYPE_KEYS=["skin_alert","oil_reset_short","oil_reset_long","repair_mode","smooth_wave","aqua_sensitive","bare_skin","vital_aging","volume_grace"];

function explainExcluded(ans,selectedTypeKey){
  const q7arr=Array.isArray(ans.q7)?ans.q7:[ans.q7||"none"];
  const q11arr=Array.isArray(ans.q11)?ans.q11:(ans.q11?[ans.q11]:[]);
  const q5arr=Array.isArray(ans.q5)?ans.q5:(ans.q5?[ans.q5]:[]);
  const q10arr=Array.isArray(ans.q10)?ans.q10:(ans.q10?[ans.q10]:[]);
  const q8arr=Array.isArray(ans.q8)?ans.q8:(ans.q8?[ans.q8]:[]);
  const reasons=[];
  for(const t of ALL_TYPE_KEYS){
    if(t===selectedTypeKey) continue;
    let r="他タイプが優先された";
    if(t==="skin_alert") r=ans.q1==="red"?"":"Q1=赤み・湿疹に該当せず";
    else if(t==="oil_reset_short") r=((ans.q1==="oily"||q11arr.includes("oily"))&&ans.q2==="short")?"":"脂性ショート条件に該当せず";
    else if(t==="oil_reset_long") r=((ans.q1==="oily"||q11arr.includes("oily"))&&ans.q2!=="short")?"":"脂性ミディアム以上条件に該当せず";
    else if(t==="repair_mode"){
      const strongChem=q7arr.some(v=>["bleach","straight","perm"].includes(v));
      const colorSerious=q7arr.includes("color")&&q8arr.some(v=>v==="split"||v==="frizz");
      const selfRepair=q11arr.includes("repair")&&q8arr.some(v=>["split","frizz","spread"].includes(v));
      r=(strongChem||colorSerious||selfRepair)?"":"ハイダメージ薬剤・深刻ダメージサインの該当なし";
    }
    else if(t==="smooth_wave") r=(ans.q6==="some"||ans.q6==="strong"||q11arr.includes("wave")||q8arr.includes("spread")||q10arr.includes("vdown")||q5arr.includes("birth")||ans.q3==="thick"||ans.q4==="more")?"":"くせ毛・うねり・広がり・太毛/多毛等の該当なし";
    else if(t==="aqua_sensitive"){
      if(!q7arr.includes("none")) r="バージン毛・健康毛条件に該当せず";
      else if(ans.q2!=="short"&&q8arr.includes("dry")) r="1年以内の薬剤処理なしでも、ミディアム以上の長さは毛先に過去の既染部が残る可能性あり（新生毛と判断できるのはショートのみ）";
      else r="";
    }
    else if(t==="bare_skin") r=(q7arr.includes("color")||q7arr.includes("none")||q7arr.includes("bleach"))?"":"強薬剤（パーマ・縮毛矯正）はRepair Mode優先";
    else if(t==="vital_aging") r=(q5arr.includes("strong")||q5arr.includes("clear")||q11arr[0]==="aging"||q11arr[0]==="gray")?"":"エイジングサイン（主訴のエイジング/白髪・50代以降の実感）なし";
    else if(t==="volume_grace") r=(q10arr.includes("volume")||q11arr.includes("volume")||((q11arr[0]==="aging"||q11arr[0]==="gray"||((q11arr.includes("aging")||q11arr.includes("gray"))&&(q5arr.includes("clear")||q5arr.includes("strong"))))&&(ans.q3==="thin"||ans.q4==="less")))?"":"「ボリュームが欲しい」回答・細毛×エイジング条件に該当せず";
    if(r) reasons.push({type:t,name:(TYPES[t]&&TYPES[t].title)||t,reason:r});
  }
  return reasons;
}

// 商品選定理由
function explainProductScoring(typeKey,ans){
  if(!TYPES[typeKey]) return [];
  const products=TYPES[typeKey].products||[];
  const want=desiredProfile(ans);
  return products.map(p=>{
    const visible=isProductDisplayable(p,ans);
    const score=scoreProduct(p,ans);
    const ingp=ING_PROFILES.find(m=>p.name.includes(m.key));
    let fitDetail=null;
    if(ingp){
      const r1=x=>Math.round(x*10)/10;
      fitDetail={
        wash:r1(2-Math.min(2,Math.abs(want.wash-ingp.w))),
        mild:r1(2-Math.min(2,Math.abs(want.mild-ingp.m))),
        moist:r1(2-Math.min(2,Math.abs(want.moist-ingp.o))),
        repair:r1(2-Math.min(2,Math.abs(want.repair-ingp.r))),
        focus:want.focus.includes(ingp.f)?r1(ingp.fl*0.6):0,
        safety:((ans.q1==="red"||ans.q1==="dry")&&ingp.w>=4)?-3:0
      };
    }
    const entry=MATCH_TAGS.find(m=>p.name.includes(m.key));
    const matched=[];
    if(entry){
      for(const q in entry.tags){
        const v=ans[q];
        const vals=Array.isArray(v)?v:(v?[v]:[]);
        const hit=vals.filter(x=>entry.tags[q].includes(x));
        if(hit.length>0) matched.push(`${q}=${hit.join(",")}`);
      }
    }
    const penalties=[];
    if(p.heavyMoisture){
      const q11arr=Array.isArray(ans.q11)?ans.q11:(ans.q11?[ans.q11]:[]);
      const q10arr=Array.isArray(ans.q10)?ans.q10:(ans.q10?[ans.q10]:[]);
      if(q11arr.includes("volume")||q10arr.includes("volume")||ans.q4==="less") penalties.push("重い保湿×ボリューム希望(-2)");
    }
    if(p.volumeUp){
      const q10arr=Array.isArray(ans.q10)?ans.q10:(ans.q10?[ans.q10]:[]);
      if(q10arr.includes("vdown")||ans.q4==="more") penalties.push("ボリュームUP訴求×Vダウン希望(-2)");
    }
    let excludedReason=null;
    if(!visible){
      if(p.summerOnly&&!isSummerSeason()) excludedReason="夏季限定（現在オフシーズン）";
      else if(p.q1Allow&&!p.q1Allow.includes(ans.q1)) excludedReason=`Q1=${ans.q1}は対象外（${p.q1Allow.join("/")}のみ）`;
      else if(p.curlAvoid) excludedReason="パーマ × ストレート訴求商品";
      else if(p.name.includes("イオ クレンジング")&&ans.q1!=="dry") excludedReason="乾燥頭皮(Q1=dry)以外は対象外";
      else excludedReason="個別ルール除外";
    }
    return{name:p.name,visible,score,topBoost:!!p.top,fitDetail,matchedTags:matched,penalties,excludedReason};
  }).sort((a,b)=>b.score-a.score);
}

function isAdminMode(){
  if(typeof window==="undefined") return false;
  try{
    const sp=new URLSearchParams(window.location.search);
    return sp.get("admin")==="1";
  }catch(e){return false;}
}

// 診断ログ管理（localStorage）
const LOG_KEY="hair_id_logs_v1";
const LOG_MAX=20;
function saveLog(record){
  try{
    const arr=JSON.parse(localStorage.getItem(LOG_KEY)||"[]");
    arr.unshift(record);
    while(arr.length>LOG_MAX) arr.pop();
    localStorage.setItem(LOG_KEY,JSON.stringify(arr));
  }catch(e){}
}
function getLogs(){
  try{return JSON.parse(localStorage.getItem(LOG_KEY)||"[]");}catch(e){return[];}
}
function clearLogs(){try{localStorage.removeItem(LOG_KEY);}catch(e){}}
function downloadJSON(record,filename){
  try{
    const blob=new Blob([JSON.stringify(record,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=filename||"hair_id_diagnosis.json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){alert("JSON出力に失敗しました: "+e.message);}
}
function copyJSON(record){
  try{
    const text=JSON.stringify(record,null,2);
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>alert("JSONをクリップボードにコピーしました"));
    }else{
      const ta=document.createElement("textarea");
      ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
      alert("JSONをクリップボードにコピーしました");
    }
  }catch(e){alert("コピーに失敗しました: "+e.message);}
}

// 統合: 診断記録を構築
function buildDiagnosisRecord(ans,typeKey){
  const{scores,log:scoreLog}=computeScores(ans);
  const{hits:contradictions,totalPenalty}=detectContradictions(ans);
  const confidence=computeConfidence(totalPenalty);
  const trace=buildTrace(ans,typeKey);
  const excluded=explainExcluded(ans,typeKey);
  const productScoring=explainProductScoring(typeKey,ans);
  return{
    timestamp:new Date().toISOString(),
    version:"transparency_v1",
    answers:ans,
    result:{typeKey,typeName:(TYPES[typeKey]&&TYPES[typeKey].title)||typeKey},
    scores,scoreLog,trace,
    contradictions,totalPenalty,confidence,
    excluded,productScoring,
  };
}

  const allProducts=[...visibleProducts,...secProducts];
  const otcProducts=allProducts.filter(p=>p.otc).map(p=>p.name);
  const recNames=allProducts.filter(p=>!p.otc).map(p=>p.name);
  const [openCat,setOpenCat]=useState(null);

function ConfidenceBadge({confidence}){
  if(!confidence) return null;
  const{display,level}=confidence;
  return h("div",{className:`conf-badge ${level}`},
    h("span",{className:"conf-badge-dot"}),
    h("span",null,"診断信頼度"),
    h("span",{className:"conf-badge-val"},`${display}%`)
  );
}

function RadarChart({scores}){
  if(!scores) return null;
  const axes=SCORE_AXES;
  const n=axes.length;
  const cx=140,cy=140,rMax=105;
  const angle=i=>(-Math.PI/2)+(i*2*Math.PI/n);
  // グリッド（同心多角形 4段階）
  const gridLevels=[0.25,0.5,0.75,1.0];
  const grids=gridLevels.map((lv,gi)=>{
    const pts=axes.map((_,i)=>{
      const r=rMax*lv;
      const x=cx+r*Math.cos(angle(i));
      const y=cy+r*Math.sin(angle(i));
      return`${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(" ");
    return h("polygon",{key:`g${gi}`,points:pts,className:"radar-grid"});
  });
  // 軸線
  const axisLines=axes.map((_,i)=>{
    const x=cx+rMax*Math.cos(angle(i));
    const y=cy+rMax*Math.sin(angle(i));
    return h("line",{key:`ax${i}`,x1:cx,y1:cy,x2:x.toFixed(1),y2:y.toFixed(1),className:"radar-axis"});
  });
  // スコアポリゴン
  const scorePts=axes.map((k,i)=>{
    const v=Math.max(0,Math.min(100,scores[k]||0));
    const r=rMax*v/100;
    const x=cx+r*Math.cos(angle(i));
    const y=cy+r*Math.sin(angle(i));
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  // ラベル
  const labels=axes.map((k,i)=>{
    const r=rMax+18;
    const x=cx+r*Math.cos(angle(i));
    const y=cy+r*Math.sin(angle(i));
    return h("text",{key:`lb${i}`,x:x.toFixed(1),y:y.toFixed(1),className:"radar-label",textAnchor:"middle",dominantBaseline:"middle"},SCORE_AXES_JA[k]);
  });
  return h("div",{className:"radar-wrap"},
    h("svg",{viewBox:"0 0 280 280",className:"radar-svg"},
      grids,axisLines,
      h("polygon",{points:scorePts,className:"radar-poly"}),
      labels
    )
  );
}

function ScoreBars({scores}){
  return h("div",null,
    SCORE_AXES.map(k=>h("div",{key:k,className:"score-bar-row"},
      h("div",{className:"score-bar-name"},SCORE_AXES_JA[k]),
      h("div",{className:"score-bar-track"},h("div",{className:"score-bar-fill",style:{width:`${scores[k]||0}%`}})),
      h("div",{className:"score-bar-val"},`${scores[k]||0}`)
    ))
  );
}

function ScoreLog({log}){
  if(!log||log.length===0) return h("div",{className:"admin-sub"},"加点ログなし");
  return h("div",{className:"score-log"},
    log.map((it,i)=>h("div",{key:i,className:"score-log-item"},
      h("span",{className:"score-log-q"},`${it.q}=${it.key}`),
      " → ",
      h("span",null,SCORE_AXES_JA[it.axis]),
      " ",
      h("span",{className:`score-log-pts ${it.points>=0?"pos":"neg"}`},`${it.points>=0?"+":""}${it.points}`),
      h("div",{style:{color:"#8a7a6a",fontSize:"0.66rem",marginLeft:"0.5rem"}},it.reason)
    ))
  );
}

function TestMode(){
  const[tmAns,setTmAns]=useState({q1:"normal",q2:"mid",q3:"normal",q4:"vol_normal",q5:["stable"],q6:"none",q7:["none"],q8:["gloss"],q9:["none"],q10:["moist"],q11:["none"]});
  const multi={q5:1,q7:1,q8:1,q9:1,q10:1,q11:1};
  const updateField=(qid,val)=>{
    if(multi[qid]) setTmAns({...tmAns,[qid]:[val]});
    else setTmAns({...tmAns,[qid]:val});
  };
  const typeKey=diagnose(tmAns);
  const record=buildDiagnosisRecord(tmAns,typeKey);
  return h("div",null,
    h("div",{className:"admin-sub"},"任意の回答を選択 → リアルタイムで診断ロジックを表示"),
    h("div",{className:"testmode-grid"},
      Object.keys(TM_OPTIONS).map(qid=>h("div",{key:qid,className:"testmode-field"},
        h("label",null,qid.toUpperCase()),
        h("select",{value:(multi[qid]?(tmAns[qid]&&tmAns[qid][0]):tmAns[qid])||"",onChange:e=>updateField(qid,e.target.value)},
          TM_OPTIONS[qid].map(o=>h("option",{key:o.k,value:o.k},o.l))
        )
      ))
    ),
    h("div",{className:"testmode-result"},
      h("div",{className:"testmode-result-key"},`→ ${typeKey} (${(TYPES[typeKey]&&TYPES[typeKey].title)||"-"})`),
      record.trace.map((t,i)=>h("div",{key:i,className:"testmode-result-trace"},
        h("strong",{style:{color:"#f5d59a"}},t.step),": ",t.condition," → ",
        h("span",{style:{color:"#7ac28a"}},t.result)
      )),
      h("div",{style:{marginTop:"0.4rem",fontSize:"0.7rem",color:"#a89880"}},
        `信頼度: ${record.confidence.display}% / 矛盾: ${record.contradictions.length}件`
      )
    )
  );
}

function LogList({onLoad}){
  const[logs,setLogs]=useState(getLogs());
  const refresh=()=>setLogs(getLogs());
  const onClear=()=>{
    if(confirm("診断ログを全削除します。よろしいですか？")){clearLogs();refresh();}
  };
  if(logs.length===0) return h("div",{className:"admin-sub"},"診断ログなし（このブラウザに保存されたものはありません）");
  return h("div",null,
    h("div",{className:"log-list"},
      logs.map((rec,i)=>h("div",{key:i,className:"log-item",onClick:()=>onLoad&&onLoad(rec)},
        h("span",{className:"log-time"},rec.timestamp?rec.timestamp.replace("T"," ").slice(0,19):"-"),
        h("span",{className:"log-type"},rec.result&&rec.result.typeName||"-"),
        h("span",{className:"log-conf"},`${rec.confidence&&rec.confidence.display||"-"}%`)
      ))
    ),
    h("div",{className:"admin-actions"},
      h("button",{className:"admin-btn",onClick:refresh},"再読込"),
      h("button",{className:"admin-btn danger",onClick:onClear},"ログ全削除")
    )
  );
}

          `[${r.confidence.level.toUpperCase()}]`)

    h("div",{className:"admin-section"},

      r.productScoring.map((p,i)=>h("div",{key:i,className:"prod-score-row"},
        h("div",{className:"prod-score-rank"},`#${i+1}`),
        h("div",{className:"prod-score-name"},
          p.name,
          p.topBoost?h("span",{style:{color:"#f5d59a",fontSize:"0.66rem",marginLeft:"0.4rem"}},"[TOP+1]"):null,
          p.fitDetail?h("div",{className:"prod-score-tags"},"成分フィット: 洗浄"+p.fitDetail.wash+" やさしさ"+p.fitDetail.mild+" 仕上がり"+p.fitDetail.moist+" 補修"+p.fitDetail.repair+" 特化+"+p.fitDetail.focus+(p.fitDetail.safety<0?" 安全"+p.fitDetail.safety:"")):null,
          p.matchedTags.length>0?h("div",{className:"prod-score-tags"},`一致: ${p.matchedTags.join(" / ")}`):null,
          p.penalties.length>0?h("div",{className:"prod-score-tags"},`減点: ${p.penalties.join(" / ")}`):null,
          p.excludedReason?h("div",{className:"prod-score-excl"},`除外: ${p.excludedReason}`):null
        ),
        h("div",{className:"prod-score-val"},p.visible?p.score:"除外")
      ))
    ),

    h("div",{className:"admin-section"},
      h("div",{className:"admin-h"},`⑧ 除外された${r.excluded.length}タイプ`),
      h("div",{className:"excluded-grid"},
        r.excluded.map((e,i)=>h("div",{key:i,className:"excluded-item"},
          h("span",{className:"excluded-type"},e.name),
          h("span",null,e.reason)
        ))
      )
    ),

    h("div",{className:"admin-section"},
      h("div",{className:"admin-h"},"⑨ テストモード（任意の回答でロジック検証）"),
      h(TestMode,null)
    ),

    h("div",{className:"admin-section"},

        `↑ ログから読込中: ${loadedRec.result.typeName} (${loadedRec.timestamp})`,
        h("button",{className:"admin-btn",style:{marginLeft:"0.6rem"},onClick:()=>setLoadedRec(null)},"現在の診断に戻る")
      ):null
    ),

    h("div",{className:"admin-section"},

        h("button",{className:"admin-btn",onClick:()=>copyJSON(r)},"クリップボードにコピー")
      )
    )
  );
}

function App(){
  const [step,setStep]=useState("intro");
  const [curQ,setCurQ]=useState(0);
  const [answers,setAnswers]=useState({});
  const [typeKey,setTypeKey]=useState(null);
  const [diagRecord,setDiagRecord]=useState(null);
  const [adminMode]=useState(()=>isAdminMode());
  const [resumeModal,setResumeModal]=useState(false);
  const [prevStep,setPrevStep]=useState(null);
  const [prevCurQ,setPrevCurQ]=useState(0);
  const [prevTypeKey,setPrevTypeKey]=useState(null);
  const [fontSize,setFontSize]=useState(()=>{
    try{return localStorage.getItem(FONT_SIZE_KEY)||"normal";}catch(e){return "normal";}
  });
  // --- Vercel Analytics カスタムイベント（診断完走率・離脱箇所の計測）---
  // diag_start=診断開始 / q_reach=各質問への到達 / diag_complete=結果到達。
  // 完走率=diag_complete÷diag_start、離脱箇所=q_reach(q:N)の減り方で把握。
  const maxQReachedRef=useRef(-1);
  function vaTrack(name,data){
    try{if(typeof window!=="undefined"&&typeof window.va==="function"){window.va("event",{name,...(data||{})});}}catch(e){}
  }
  // 診断実行＋透明化レコード構築＋ログ保存を一括
  function runDiagnosisFull(ans){
    const tk=diagnose(ans);
    const rec=buildDiagnosisRecord(ans,tk);
    setTypeKey(tk);
    setDiagRecord(rec);
    saveLog(rec);
    vaTrack("diag_complete",{type:tk});
    return tk;
  }
  // 進行中タイマー（遷移用 setTimeout）を集約管理。途中で「戻る」「ヘッダーから再開」が押されたらキャンセル
  const timersRef=useRef([]);
  function setTracedTimeout(fn,ms){
    const id=setTimeout(()=>{
      timersRef.current=timersRef.current.filter(t=>t!==id);
      fn();
    },ms);
    timersRef.current.push(id);
    return id;
  }
  function clearAllTimers(){
    timersRef.current.forEach(id=>clearTimeout(id));
    timersRef.current=[];
  }
  // アンマウント時にタイマー解放
  useEffect(()=>()=>clearAllTimers(),[]);
  useEffect(()=>{
    document.documentElement.dataset.fontSize=fontSize;
    try{localStorage.setItem(FONT_SIZE_KEY,fontSize);}catch(e){}
  },[fontSize]);
  const totalQ=QUESTIONS.length;
  const prog=step==="quiz"?((curQ+1)/totalQ*100):step==="result"||step==="products"?100:0;
  useEffect(()=>{const bar=document.getElementById("pbar");bar.style.width=prog+"%";bar.setAttribute("aria-valuenow",Math.round(prog));},[prog]);
  useEffect(()=>{window.scrollTo({top:0,behavior:"instant"});},[step]);
  // 質問到達を計測（最大到達問のみ＝「戻る」での二重計上を防ぐ）
  useEffect(()=>{
    if(step==="quiz"&&curQ>maxQReachedRef.current){
      maxQReachedRef.current=curQ;
      vaTrack("q_reach",{q:curQ+1});
    }
  },[step,curQ]);
  // 再開モーダル表示時に「再開する」ボタンへ自動フォーカス（アクセシビリティ）
  const resumeBtnRef=useRef(null);
  useEffect(()=>{
    if(resumeModal&&resumeBtnRef.current){resumeBtnRef.current.focus();}
    if(resumeModal){document.body.style.overflow='hidden';}
    else{document.body.style.overflow='';}
    return ()=>{document.body.style.overflow='';};
  },[resumeModal]);
  function startQuiz(){clearAllTimers();setStep("quiz");setCurQ(0);setAnswers({});maxQReachedRef.current=-1;vaTrack("diag_start");}
  function selectOpt(k){
    const q=QUESTIONS[curQ];
    const na={...answers,[q.id]:k};
    setAnswers(na);
    setTracedTimeout(()=>{
      if(curQ<totalQ-1){setCurQ(curQ+1);}
      else{setStep("loading");setTracedTimeout(()=>{runDiagnosisFull(na);setStep("result");},1000);}
    },280);
  }
  function toggleQ5(k){
    const cur=Array.isArray(answers.q5)?answers.q5:[];
    let next;
    if(k==="stable"){
      next=["stable"];
    } else {
      const without=cur.filter(v=>v!=="stable"&&v!==k);
      next=cur.includes(k)?without:[...without,k];
    }
    setAnswers({...answers,q5:next});
  }
  function toggleQ7(k){
    const cur=Array.isArray(answers.q7)?answers.q7:[];
    let next;
    if(k==="none"){
      next=["none"];
    } else {
      const without=cur.filter(v=>v!=="none"&&v!==k);
      next=cur.includes(k)?without:[...without,k];
    }
    setAnswers({...answers,q7:next});
  }
  function toggleQ8(k){
    const cur=Array.isArray(answers.q8)?answers.q8:[];
    const next=cur.includes(k)?cur.filter(v=>v!==k):[...cur,k];
    setAnswers({...answers,q8:next});
  }
  function toggleQ9(k){
    const cur=Array.isArray(answers.q9)?answers.q9:[];
    let next;
    if(k==="none"){
      next=["none"];
    } else {
      const without=cur.filter(v=>v!=="none"&&v!==k);
      next=cur.includes(k)?without:[...without,k];
    }
    setAnswers({...answers,q9:next});
  }
  function toggleQ10(k){
    // volume と vdown は相互排他（ボリュームアップ／ダウンは逆方向）
    const VOLUME_AXIS=["volume","vdown"];
    const cur=Array.isArray(answers.q10)?answers.q10:[];
    if(cur.includes(k)){
      setAnswers({...answers,q10:cur.filter(v=>v!==k)});
      return;
    }
    const filtered=VOLUME_AXIS.includes(k)?cur.filter(v=>!VOLUME_AXIS.includes(v)):cur;
    setAnswers({...answers,q10:[...filtered,k]});
  }
  function toggleQ11(k){
    const cur=Array.isArray(answers.q11)?answers.q11:[];
    let next;
    if(k==="none"){
      next=["none"];
    } else {
      const without=cur.filter(v=>v!=="none"&&v!==k);
      next=cur.includes(k)?without:[...without,k];
    }
    setAnswers({...answers,q11:next});
  }
  function handleHeaderClick(){
    if(step==="intro") return;
    clearAllTimers();
    if(Object.keys(answers).length>0){
      setPrevStep(step);
      setPrevCurQ(curQ);
      setPrevTypeKey(typeKey);
      setStep("intro");
      setResumeModal(true);
    } else {
      setStep("intro");
    }
  }
  function resumeQuiz(){
    clearAllTimers();
    setStep(prevStep||"quiz");
    setCurQ(prevCurQ||0);
    if(prevTypeKey) setTypeKey(prevTypeKey);
    setResumeModal(false);
  }
  function freshStart(){
    clearAllTimers();
    setAnswers({});
    setCurQ(0);
    setTypeKey(null);
    setPrevStep(null);
    setPrevCurQ(0);
    setPrevTypeKey(null);
    setResumeModal(false);
    setStep("quiz");
    maxQReachedRef.current=-1;
    vaTrack("diag_start");
  }
  function confirmMulti(qid){
    const na={...answers};
    const arr=Array.isArray(na[qid])?na[qid]:[];
    if(arr.length===0) return;
    if(curQ<totalQ-1){setCurQ(curQ+1);}
    else{setStep("loading");setTracedTimeout(()=>{runDiagnosisFull(na);setStep("result");},1000);}
  }
  function goBack(){clearAllTimers();if(curQ>0)setCurQ(curQ-1);else setStep("intro");}
  function retry(){clearAllTimers();setStep("intro");setAnswers({});setCurQ(0);setTypeKey(null);setDiagRecord(null);}
  const td=typeKey?TYPES[typeKey]:null;
  return h("div",null,
    resumeModal&&h("div",{className:"modal-overlay",role:"dialog","aria-modal":"true","aria-labelledby":"resume-modal-title"},
      h("div",{className:"modal-box"},
        h("p",{className:"modal-title",id:"resume-modal-title"},"前回の診断を再開しますか？"),
        h("p",{className:"modal-desc"},"途中までの回答が残っています。"),
        h("button",{className:"btn-primary",onClick:resumeQuiz,ref:resumeBtnRef},h("span",null,"再開する")),
        h("button",{className:"btn-ghost",onClick:freshStart},"最初からやり直す")
      )
    ),
    h("header",{
      className:"hdr",
      onClick:handleHeaderClick,
      onKeyDown:(e)=>{ if(step!=="intro"&&(e.key==="Enter"||e.key===" ")){e.preventDefault();handleHeaderClick();} },
      role:step!=="intro"?"button":undefined,
      tabIndex:step!=="intro"?0:undefined,
      "aria-label":step!=="intro"?"トップに戻る":undefined,
      style:{cursor:step!=="intro"?"pointer":"default"}
    },
      h("p",{className:"hdr-eye"},"Hair Care Diagnosis"),
      h("h1",{className:"hdr-h1"},h("span",{className:"hdr-h1-ja"},"シャンプー診断")," Hair Identity")
    ),
    h("main",{className:"wrap"},
      h("h2",{className:"visually-hidden"},"ヘアケア診断アプリ"),
      step==="intro"&&h("div",{className:"fade"},
        h("div",{className:"trust-bar"},
          h(Icon,{name:"shield-check",size:16,color:"var(--gold)"}),
          h("p",{className:"trust-bar-txt"},"この診断では、無理にご購入をおすすめすることはありません。現場での経験をもとに、あなたの髪質に合ったケアをご提案します。")
        ),
        h("p",{className:"sec-label"},"About"),
        h("h2",{className:"sec-title"},"あなたの髪を、\nもっと深く知ってほしい。"),
        h("p",{className:"sec-desc"},
          "11の質問に答えるだけで、髪と頭皮のタイプを診断。",
          h("br",{className:"sp-br"}),
          "プロが厳選したシャンプーをご提案します。",
          h("br",{className:"sp-br"}),
          "所要時間：約2〜3分"
        ),
        h("button",{className:"btn-primary",onClick:startQuiz},h(Icon,{name:"scissors",size:14}),h("span",{style:{marginLeft:".5rem"}},"診断をはじめる")),
        h("div",{className:"fs-selector",role:"group","aria-label":"文字サイズの選択"},
          h("span",{className:"fs-selector-lbl"},"文字サイズ"),
          FONT_SIZE_OPTIONS.map(opt=>h("button",{
            key:opt.key,
            type:"button",
            className:"fs-btn "+opt.btnClass+(fontSize===opt.key?" active":""),
            "aria-pressed":fontSize===opt.key,
            onClick:(e)=>{e.currentTarget.blur();setFontSize(opt.key);}
          },opt.label))
        ),
        h("div",{className:"intro-msg"},
          h("p",{className:"intro-msg-quote"},"「シャンプー、何がおすすめですか？」"),
          h("p",{className:"intro-msg-body"},"サロンで毎日のように受ける質問でした。膨大な数のシャンプーから、本当に合う一本を選び切れない歯がゆさが、ずっとありました。"),
          h("p",{className:"intro-msg-body"},"水の次に多く含まれる「界面活性剤」と、近年進化する補修成分。この組み合わせが、髪と頭皮への影響を大きく左右します。"),
          h("p",{className:"intro-msg-body"},"このアプリは、シャンプー選びをAIと一緒に見直すために作りました。あなたの最適解へ導きます。")
        ),
        h("div",{className:"profile-top"},
          h("div",{className:"profile-top-photo"},
            h("img",{src:PHOTO_SRC,alt:"橋元リョウイチ"})
          ),
          h("div",{className:"profile-top-info"},
            h("p",{className:"profile-top-curated"},"HAIR IDENTITY CURATED BY"),
            h("p",{className:"profile-top-name"},"橋元リョウイチ"),
            h("p",{className:"profile-top-role",style:{marginBottom:0}},"Freelance Hair Stylist / 原宿 VIRGO"),
            h("p",{style:{fontSize:".82rem",color:"var(--muted)",marginTop:".4rem",lineHeight:1.7}},"診断後、必要であればサロンでも直接ご相談いただけます。")
          )
        )
      ),
      step==="quiz"&&h("div",null,
        h("div",{className:"dots"},QUESTIONS.map((_,i)=>h("div",{key:i,className:"dot"+(i===curQ?" active":i<curQ?" done":"")}))),
        h("div",{className:"fade",key:curQ},
          h("p",{className:"q-cat"},QUESTIONS[curQ].cat),
          h("p",{className:"q-num"},`Q${String(curQ+1).padStart(2,"0")} / ${String(totalQ).padStart(2,"0")}`),
          h("p",{className:"q-text"},QUESTIONS[curQ].text),
          QUESTIONS[curQ].id==="q8"&&h("p",{style:{fontSize:".78rem",color:"var(--muted)",marginBottom:".4rem"}},"※ 気になる状態をすべて選択してください（複数選択可）。タップ順は番号で表示されます。"),
          QUESTIONS[curQ].id==="q10"&&h("p",{style:{fontSize:".78rem",color:"var(--muted)",marginBottom:".4rem"}},"※ なりたい仕上がりをすべて選択してください（複数選択可）。タップ順は番号で表示されます。"),
          QUESTIONS[curQ].id==="q11"&&h("p",{className:"q11-hint"},"※ 気になるお悩みをすべて選択してください（複数選択可）。タップ順は番号で表示されます。"),
          h("div",{className:"opts"},QUESTIONS[curQ].opts.map((opt,optIdx)=>{
            const qid=QUESTIONS[curQ].id;
            const isMulti=qid==="q5"||qid==="q7"||qid==="q8"||qid==="q9"||qid==="q10"||qid==="q11";
            const arr=Array.isArray(answers[qid])?answers[qid]:[];
            const isSel=isMulti?arr.includes(opt.k):answers[qid]===opt.k;
            const order=(qid==="q8"||qid==="q10"||qid==="q11")&&isSel?arr.indexOf(opt.k)+1:0;
            const circled=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];
            return h("button",{key:opt.k,className:"opt"+(isSel?" sel":""),"aria-pressed":isSel,onClick:(e)=>{e.currentTarget.blur();
              qid==="q5"?(toggleQ5(opt.k),opt.k==="stable"&&setTracedTimeout(()=>{if(curQ<totalQ-1)setCurQ(curQ+1);else{setStep("loading");setTracedTimeout(()=>{runDiagnosisFull({...answers,q5:["stable"]});setStep("result");},1000);}},280)):qid==="q7"?(toggleQ7(opt.k),opt.k==="none"&&setTracedTimeout(()=>{if(curQ<totalQ-1)setCurQ(curQ+1);else{setStep("loading");setTracedTimeout(()=>{runDiagnosisFull({...answers,q7:["none"]});setStep("result");},1000);}},280)):qid==="q8"?toggleQ8(opt.k):qid==="q9"?(toggleQ9(opt.k),(opt.k==="none"||(opt.k==="other"&&!(Array.isArray(answers.q9)&&answers.q9.length>0)))&&setTracedTimeout(()=>{if(curQ<totalQ-1)setCurQ(curQ+1);else{setStep("loading");setTracedTimeout(()=>{runDiagnosisFull({...answers,q9:[opt.k]});setStep("result");},1000);}},280)):qid==="q10"?toggleQ10(opt.k):qid==="q11"?toggleQ11(opt.k):selectOpt(opt.k);
            }},
              h("span",{className:"opt-lt"},opt.l),
              h("span",{style:{flex:1}},opt.t),
              order>0&&h("span",{style:{marginLeft:"auto",fontSize:"1.15rem",color:"var(--gold)",fontWeight:500,lineHeight:1}},circled[order-1]||`${order}`)
            );
          })),
          (QUESTIONS[curQ].id==="q5"||QUESTIONS[curQ].id==="q7"||QUESTIONS[curQ].id==="q8"||QUESTIONS[curQ].id==="q9"||QUESTIONS[curQ].id==="q10"||QUESTIONS[curQ].id==="q11")&&h("button",{
            className:"btn-primary",
            style:{marginTop:"1rem",opacity:(Array.isArray(answers[QUESTIONS[curQ].id])&&answers[QUESTIONS[curQ].id].length>0)?1:0.4},
            disabled:!(Array.isArray(answers[QUESTIONS[curQ].id])&&answers[QUESTIONS[curQ].id].length>0),
            onClick:()=>confirmMulti(QUESTIONS[curQ].id)
          },"次へ →")
        ),
        h("button",{className:"btn-ghost",onClick:goBack},"← 前の質問に戻る")
      ),
      step==="loading"&&h("div",{className:"loading"},h("div",{className:"spin"}),h("p",{className:"loading-txt"},"髪質を分析しています…")),
      step==="result"&&td&&h("div",{className:"fade"},
        adminMode&&diagRecord&&h(AdminPanel,{record:diagRecord}),
        getDisplayCharImg(typeKey,answers)&&h("img",{src:getDisplayCharImg(typeKey,answers),alt:getDisplayTitle(typeKey,answers),className:"char-img",loading:"lazy"}),
        h("span",{className:"badge"},getDisplayBadge(typeKey,answers)),
        h("h2",{className:"res-title"},getDisplayTitle(typeKey,answers)),
        h("p",{className:"res-sub"},getDisplaySub(typeKey,answers)),
        diagRecord&&h(ConfidenceBadge,{confidence:diagRecord.confidence}),
        td.alert&&h("div",{className:"alert-box"},td.alert),
        h("div",{className:"summary-box"},
          h("p",{className:"summary-lbl"},h(Icon,{name:"feather",size:11,color:"var(--gold)"}),h("span",null,"あなたの回答から")),
          h("p",{className:"summary-txt"},buildResultSummary(typeKey,answers))
        ),
        (()=>{
          const adv=getDisplayAdvice(typeKey,answers);
          if(!adv||!adv.length) return null;
          const firstAdvice=adv.find(t=>!t.startsWith("※"))||adv[0];
          return h("div",{className:"ai-box",style:{marginTop:"1.4rem"}},
            h("p",{className:"ai-lbl"},h(Icon,{name:"sparkles",size:11,color:"var(--gold)"}),h("span",null,"Hair Advice — Ryoichi Hashimoto")),
            h("p",{className:"ai-txt"},firstAdvice)
          );
        })(),
        h("button",{className:"btn-primary btn-primary-lg",onClick:()=>setStep("products")},h("span",null,"おすすめのシャンプーを見る ↗")),
        h("button",{className:"btn-ghost",onClick:retry},"もう一度診断する")
      ),
      step==="products"&&td&&h("div",{className:"fade"},
        getDisplayCharImg(typeKey,answers)&&h("img",{src:getDisplayCharImg(typeKey,answers),alt:getDisplayTitle(typeKey,answers),className:"char-img",loading:"lazy"}),
        h("span",{className:"badge"},getDisplayBadge(typeKey,answers)),
        h("h2",{className:"res-title"},getDisplayTitle(typeKey,answers)),
        h("p",{className:"res-sub"},getDisplaySub(typeKey,answers)),
        h("hr",{className:"divider"}),
        // ── 詳しいアドバイス（結果画面で表示済みの1段落目を除いた続き）──
        (()=>{
          const adv=getDisplayAdvice(typeKey,answers);
          if(!adv||!adv.length) return null;
          // 結果画面で表示している先頭の非noteアイテムを除外して残りを表示
