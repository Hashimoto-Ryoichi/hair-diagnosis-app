function scoreProduct(product,answers){
  const entry=MATCH_TAGS.find(m=>product.name.includes(m.key));
  if(!entry) return 0;
  let s=0;
  for(const q in entry.tags){
    if(q==="q7"){
      const q7arr=Array.isArray(answers.q7)?answers.q7:[answers.q7||"none"];
      if(entry.tags.q7.some(t=>q7arr.includes(t))) s++;
    } else if(q==="q8"){
      const q8arr=Array.isArray(answers.q8)?answers.q8:[answers.q8].filter(Boolean);
      if(q8arr.length>0&&entry.tags.q8.includes(q8arr[0])) s+=2;
      else if(q8arr.some(t=>entry.tags.q8.includes(t))) s++;
    } else if(q==="q10"){
      const q10arr=Array.isArray(answers.q10)?answers.q10:[answers.q10].filter(Boolean);
      if(q10arr.length>0&&entry.tags.q10.includes(q10arr[0])) s+=2;
      else if(q10arr.some(t=>entry.tags.q10.includes(t))) s++;
    } else {
      if(entry.tags[q].includes(answers[q])) s++;
    }
  }
  return s;
}

function diagnose(ans){
  const {q1,q2,q3,q6}=ans;
  const q4arr=Array.isArray(ans.q4)?ans.q4:(ans.q4?[ans.q4]:["normal"]);
  // Q11は複数選択配列。先頭（最初に押した=最重視）を主回答として使用
  const q11arr=Array.isArray(ans.q11)?ans.q11:(ans.q11?[ans.q11]:[]);
  const q11=q11arr[0]||"none";
  // Q9は複数選択配列。高機能器具が1つでも含まれればgoodTool=true
  const q9arr=Array.isArray(ans.q9)?ans.q9:[ans.q9||"none"];

  // Q5は複数選択配列。組み合わせで優先度を決定
  const q5arr=Array.isArray(ans.q5)?ans.q5:[ans.q5||"stable"];
  const hasBirth=q5arr.includes("birth");
  const hasClear=q5arr.includes("clear");
  const hasStrong=q5arr.includes("strong");
  const eq5=hasStrong?"strong":hasClear?"clear":hasBirth?"birth":q5arr.includes("early")?"early":q5arr.includes("young")?"young":"stable";

  // Q7は複数選択配列。最強ダメージを1つ抽出して診断に使う
  const Q7_PRIORITY=["bleach","straight","perm","color","none"];
  const q7arr=Array.isArray(ans.q7)?ans.q7:[ans.q7||"none"];
  const eq7=Q7_PRIORITY.find(p=>q7arr.includes(p))||"none";

  // Q8は複数選択配列。先頭（最初に押した=最重視）を主回答として使用
  const q8arr=Array.isArray(ans.q8)?ans.q8:(ans.q8?[ans.q8]:[]);
  const q8=q8arr[0];

  // Q10は複数選択配列。先頭（最初に押した=最重視）を主回答として使用
  const q10arr=Array.isArray(ans.q10)?ans.q10:(ans.q10?[ans.q10]:[]);
  const q10=q10arr[0];

  // ── Step1: 頭皮トラブル・脂性は最優先 ──────────────────
  if(q1==="red") return "skin_alert";
  if(q1==="oily"&&(eq7==="none"||eq7==="color")) return q2==="short"?"oil_reset_short":"oil_reset_long";

  // ── Step2: 60代以降 or（50代＋出産後）→ Vital Aging 確定 ──
  if(eq5==="strong") return "vital_aging";

  // ── Step3: 薬剤ダメージ ────────────────────────────────
  // 全体ブリーチ・インナーカラー
  // ショート：毛先ダメージ（パサつき・チリつき・枝毛・広がり）があればRepair、なければBare Skin
  // ミディアム以上：Repair確定
  if(eq7==="bleach"){
    if(q2==="short"){
      const hasEndDmg=q8arr.some(v=>v==="dry"||v==="frizz"||v==="split"||v==="spread");
      return hasEndDmg?"repair_mode":"bare_skin";
    }
    return "repair_mode";
  }
  // 縮毛矯正 → トステア配合 Repair Mode 確定
  if(eq7==="straight") return "repair_mode";
  // パーマ → トステアの熱反応でカール持続にも有効 → Repair Mode 確定
  if(eq7==="perm") return "repair_mode";
  // カラー + 深刻ダメージサイン → Q9で分岐
  // 高機能器具（リファ・ビューロン・レプロナイザー・ナノイー）でダメージ軽減 → Bare Skin
  // 普通器具・使わない → Repair Mode（補修強め）
  if(eq7==="color"&&(q8==="split"||q8==="frizz"||q8==="spread")){
    const goodTool=q9arr.some(v=>v==="refa"||v==="bio"||v==="repro"||v==="nanoe");
    return goodTool?"bare_skin":"repair_mode";
  }

  // 出産後の髪変化（単独）→ うねり由来として Smooth Wave
  if(hasBirth) return "smooth_wave";

  // ── Step4: くせ毛・うねりが主訴 ──────────────────────
  const hasKuse=q6==="some"||q6==="strong";
  const hasSpread=q8==="spread";
  const wantVolume=q10==="volume";

  if(hasKuse||hasSpread){
    if(wantVolume&&(eq7==="none"||eq7==="color")) return "aqua_sensitive";
    return "smooth_wave";
  }

  // ── Step5: Q8 現在の髪の状態 ─────────────────────────
  if(q8==="frizz"||q8==="split"){
    return "bare_skin";
  }
  if(q8==="flat"){
    if(wantVolume) return "aqua_sensitive";
    return eq7==="none"?"aqua_sensitive":"bare_skin";
  }

  // ── Step6: Q3 太さ × Q4 硬さ ─────────────────────────
  const isThickHard=(q3==="thick"||q4arr.includes("hard")||q4arr.includes("more"));
  const isThinSoft =(q3==="thin"||q4arr.includes("soft")||q4arr.includes("less"));

  if(isThickHard){
    if(q10==="vdown"||q10==="moist") return "smooth_wave";
    if(q8==="dry"&&eq7==="color") return "bare_skin";
    return "smooth_wave";
  }
  if(isThinSoft){
    if(wantVolume) return "aqua_sensitive";
    if(eq7==="none") return "aqua_sensitive";
    return "bare_skin";
  }

  // ── Step7: Q11 悩みで最終決定 ────────────────────────
  if(q11==="oily") return q2==="short"?"oil_reset_short":"oil_reset_long";
  if(q11==="wave"){
    return "smooth_wave";
  }
  if(q11==="repair"){
    // 自覚あり + Q8深刻ダメージサイン → Repair Mode、それ以外 Bare Skin
    if(q8==="split"||q8==="frizz"||q8==="spread") return "repair_mode";
    return "bare_skin";
  }
  if(q11==="aging") return "vital_aging";
  if(q11==="volume"){
    // ボリュームが欲しい：細毛・少毛量はVital Aging寄り、それ以外はAqua Sensitive
    if(isThinSoft) return eq5==="clear"||eq5==="strong"?"vital_aging":"aqua_sensitive";
    return "aqua_sensitive";
  }

  // ── Step8: Q10 なりたい髪質を最終反映 ───────────────
  if(q10==="volume"){
    return "aqua_sensitive";
  }
  if(q10==="vdown") return "smooth_wave";

  // ── Step9: デフォルト ─────────────────────────────
  if(eq7==="none"&&(q8==="gloss"||q8==="dry")) return "aqua_sensitive";
  return "bare_skin";
}

function buildResultSummary(typeKey,answers){
  const q1=answers.q1||"normal";
  const q2=answers.q2||"mid";
  const q4arr=Array.isArray(answers.q4)?answers.q4:(answers.q4?[answers.q4]:["normal"]);
  const q6=answers.q6||"none";
  const q7arr=Array.isArray(answers.q7)?answers.q7:(answers.q7?[answers.q7]:["none"]);
  const q8arr=Array.isArray(answers.q8)?answers.q8:(answers.q8?[answers.q8]:[]);
  const q5arr=Array.isArray(answers.q5)?answers.q5:(answers.q5?[answers.q5]:["stable"]);
  const q11arr=Array.isArray(answers.q11)?answers.q11:(answers.q11?[answers.q11]:["none"]);

  const lengthLbl=q2==="short"?"ショート":q2==="mid"?"ミディアム":q2==="semi"?"セミロング":"ロング";

  switch(typeKey){
    case "skin_alert":
      return "頭皮に赤みや炎症のサインが見られます。まずは皮膚科での確認を優先しながら、刺激の少ない低刺激シャンプーでやさしくケアしていきましょう。";
    case "oil_reset_short":
      return `頭皮の皮脂分泌が多めで、${lengthLbl}スタイルではベタつきが直接出やすいタイプです。洗浄力のしっかりしたシャンプーで、頭皮環境を清潔に整えましょう。`;
    case "oil_reset_long":
      return `頭皮はベタつきやすいのに、${lengthLbl}の毛先は乾燥しやすいというアンバランスが起きやすいタイプです。頭皮と毛先、それぞれに合うケアを使い分けていきましょう。`;
    case "repair_mode":{
      const causes=[];
      if(q7arr.includes("bleach")) causes.push("ブリーチ");
      if(q7arr.includes("straight")) causes.push("縮毛矯正");
      if(q7arr.includes("perm")) causes.push("パーマ");
      if(causes.length===0&&q7arr.includes("color")) causes.push("カラー");
      const causeStr=causes.length>0?causes.join("・")+"による":"薬剤処理による";
      const dmgList=[];
      if(q8arr.includes("split")) dmgList.push("枝毛");
      if(q8arr.includes("frizz")) dmgList.push("チリつき");
      if(q8arr.includes("spread")) dmgList.push("広がり");
      if(q8arr.includes("dry")) dmgList.push("パサつき");
      const dmgStr=dmgList.length>0?dmgList.slice(0,2).join("や")+"が気になる":"ダメージが蓄積しやすい";
      return `${causeStr}${dmgStr}髪質の方です。補修成分が豊富なシャンプーで、内側からしっかりとケアしていきましょう。`;
    }
    case "smooth_wave":{
      const kuseLbl=q6==="strong"?"強いくせ・うねり":q6==="some"?"くせやうねり":"うねりや広がり";
      return `${kuseLbl}が気になるタイプです。保湿ケアでうねりをコントロールしながら、まとまりのある髪へ導いていきましょう。`;
    }
    case "aqua_sensitive":{
      const skinLbl=q1==="dry"?"乾燥しやすい頭皮":q1==="mix"?"混合タイプの頭皮":"バランスのとれた頭皮";
      return `${skinLbl}と、ダメージの少ない健康な髪質をお持ちです。過度なケアを避け、やさしいシャンプーで潤いバランスを保ちましょう。`;
    }
    case "bare_skin":{
      const dmgStr=q7arr.includes("color")?"カラーによる軽いダメージ":"軽めの薬剤ダメージ";
      return `${dmgStr}がある髪質の方です。色持ちと補修を両立できるシャンプーで、ツヤのある仕上がりをキープしましょう。`;
    }
    case "vital_aging":{
      const when=q5arr.includes("strong")?"60代以降から":q5arr.includes("clear")?"50代から":"年齢とともに";
      const wantVol=q11arr.includes("volume")||q4arr.includes("less")||q8arr.includes("flat");
      const tail=wantVol?"根元から立ち上がる、ふんわりとした仕上がりを取り戻しましょう。":"ハリ・コシを補い、エイジングのサインに寄り添うケアをしていきましょう。";
      return `${when}実感しやすい、ハリ・コシ・ボリューム不足が気になるタイプです。エイジングケアに特化したシャンプーで、${tail}`;
    }
    default: return "";
  }
}

// セカンドセクション：診断結果に対する補助的なおすすめ商品
function findSecondarySection(typeKey,answers){
  const q1=answers.q1;
  const q7arr=Array.isArray(answers.q7)?answers.q7:(answers.q7?[answers.q7]:[]);
  const q8arr=Array.isArray(answers.q8)?answers.q8:(answers.q8?[answers.q8]:[]);
  const findP=(tk,kw)=>TYPES[tk]&&TYPES[tk].products.find(p=>p.name.includes(kw));

  if(typeKey==="repair_mode"&&q1==="oily"){
    return{label:"地肌のベタつきが気になる日に",desc:"週1〜2回の地肌リセット用に取り入れたい方へ。",products:[findP("oil_reset_short","WELLP"),findP("oil_reset_short","デオコ")].filter(Boolean)};
  }
  if(typeKey==="bare_skin"&&q8arr.some(v=>v==="dry"||v==="split"||v==="frizz"||v==="spread")){
    return{label:"毛先のダメージが深刻な場合は",desc:"より強い補修ケアに切り替えたい方へ。",products:[findP("repair_mode","Straine"),findP("repair_mode","SN repair")].filter(Boolean)};
  }
  if(typeKey==="smooth_wave"&&q8arr.some(v=>v==="split"||v==="frizz")){
    return{label:"毛先ダメージも気になる場合は",desc:"うねりケアに加えて、補修も強化したい方へ。",products:[findP("repair_mode","Straine")].filter(Boolean)};
  }
  if((typeKey==="oil_reset_short"||typeKey==="oil_reset_long")&&q7arr.some(v=>v==="color"||v==="bleach")&&q8arr.some(v=>v==="dry"||v==="split"||v==="frizz"||v==="spread")){
    return{label:"毛先のケアもしたい場合は",desc:"頭皮ケアと並行して、髪の補修も意識したい方へ。",products:[findP("bare_skin","ジアンサー")].filter(Boolean)};
  }
  return null;
}

const {createElement:h,useRef,useEffect,useState}=React;
function Icon({name,size=16,color}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.lucide){
      ref.current.innerHTML="";
      const s=lucide.icons[name]?.toSvg({width:size,height:size,color:color||"currentColor"});
      if(s) ref.current.innerHTML=s;
    }
  },[name,size,color]);
  return h("span",{ref,style:{display:"inline-flex",alignItems:"center"}});
}

function SurfactantChart({typeKey}){
  const td=typeKey?TYPES[typeKey]:null;
  const otcProducts=td?td.products.filter(p=>p.otc).map(p=>p.name):[];
  const recNames=td?td.products.filter(p=>!p.otc).map(p=>p.name):[];
  const [openCat,setOpenCat]=useState(null);
  return h("div",{className:"ingr-box"},
    // ── タイトル ──────────────────────────────
    h("div",{className:"ingr-ttl"},
      h(Icon,{name:"flask-conical",size:14,color:"var(--gold)"}),
      h("span",{style:{marginLeft:".35rem"}},"おすすめシャンプーで使われている界面活性剤")
    ),
    h("p",{className:"ingr-star-meaning"},
      h("span",{className:"ingr-star-meaning-stars"},"★"),
      "の数は肌への刺激の強さを表します（",
      h("span",{className:"ingr-star-meaning-stars"},"★1"),
      "：低刺激 〜 ",
      h("span",{className:"ingr-star-meaning-stars"},"★5"),
      "：高刺激）"
    ),
    h("p",{className:"ingr-detail-intro"},"7系統に分類しています。系統名をタップすると、細分類と成分名がご覧いただけます。"),

    // ── 5分類カード ──────────────────────────────
    SURFACTANT_DETAIL.map((g,gi)=>{
      const isOpen=openCat===gi;
      const isMatch=typeKey&&g.types.includes(typeKey);
      const matchedProducts=isMatch?g.products.filter(pn=>recNames.some(n=>n.includes(pn))):[];
      return h("div",{key:gi,className:"ingr-cat"+(isMatch&&matchedProducts.length>0?" ingr-cat-match":"")},
        h("button",{className:"ingr-cat-head",onClick:()=>setOpenCat(isOpen?null:gi)},
          h("div",{className:"ingr-cat-stars"},
            Array.from({length:5}).map((_,si)=>{
              const filled=si<Math.floor(g.rank);
              const half=!filled&&(g.rank%1!==0)&&(si===Math.floor(g.rank));
              return h("span",{key:si,className:"ingr-star"+(filled?" filled":half?" half":"")},"★");
            })
          ),
          h("div",{className:"ingr-cat-info"},
            h("span",{className:"ingr-cat-name"},g.cat),
            h("span",{className:"ingr-cat-desc"},g.desc),
            matchedProducts.length>0&&h("span",{className:"ingr-cat-products"},
              "← "+matchedProducts.join("・")

          ),
          h(Icon,{name:isOpen?"chevron-up":"chevron-down",size:12,color:"var(--muted)"})
        ),
        isOpen&&h("div",{className:"ingr-cat-items"},
          g.groups.map((sg,sgi)=>
            h("div",{key:sgi,className:"ingr-subgroup"},
              h("p",{className:"ingr-subgroup-name"},sg.sub),
              h("ul",{className:"ingr-subgroup-list"},
                sg.items.map((item,ii)=>h("li",{key:ii},item))
              )
            )
          )
        )
      );
    }),

    // ── 医薬部外品の注記 ──────────────────────────────
    otcProducts.length>0&&h("p",{className:"ingr-otc-note"},
      h(Icon,{name:"info",size:11,color:"var(--muted)"}),
      h("span",{style:{marginLeft:".35rem"}},
        otcProducts.join("・")+" は医薬部外品のため、成分の詳細表示は省略しています。"
      )
    )
  );

function App(){
  const [step,setStep]=useState("intro");
  const [curQ,setCurQ]=useState(0);
  const [answers,setAnswers]=useState({});
  const [typeKey,setTypeKey]=useState(null);
  const [resumeModal,setResumeModal]=useState(false);
  const [prevStep,setPrevStep]=useState(null);
  const [prevCurQ,setPrevCurQ]=useState(0);
  const [prevTypeKey,setPrevTypeKey]=useState(null);
  const totalQ=QUESTIONS.length;
  const prog=step==="quiz"?(curQ/totalQ*100):step==="result"||step==="products"?100:0;
  useEffect(()=>{document.getElementById("pbar").style.width=prog+"%";},[prog]);
  useEffect(()=>{window.scrollTo({top:0,behavior:"instant"});},[step]);
  function startQuiz(){setStep("quiz");setCurQ(0);setAnswers({});}
  function selectOpt(k){
    const q=QUESTIONS[curQ];
    const na={...answers,[q.id]:k};
    setAnswers(na);
    setTimeout(()=>{
      if(curQ<totalQ-1){setCurQ(curQ+1);}
      else{setTypeKey(diagnose(na));setStep("result");}
    },280);
  }
  function toggleQ4(k){
    const cur=Array.isArray(answers.q4)?answers.q4:[];
    const next=cur.includes(k)?cur.filter(v=>v!==k):[...cur,k];
    setAnswers({...answers,q4:next});
  }
  function toggleQ5(k){
    const cur=Array.isArray(answers.q5)?answers.q5:[];
    let next;
    if(k==="stable"){
      next=["stable"];
    } else {
      const without=cur.filter(v=>v!=="stable"&&v!==k);
      next=cur.includes(k)?without:[...without,k];
    }
    setAnswers({...answers,q5:next});
  }
  function toggleQ7(k){
    const cur=Array.isArray(answers.q7)?answers.q7:[];
    let next;
    if(k==="none"){
      next=["none"];
    } else {
      const without=cur.filter(v=>v!=="none"&&v!==k);
      next=cur.includes(k)?without:[...without,k];
    }
    setAnswers({...answers,q7:next});
  }
  function toggleQ8(k){
    const cur=Array.isArray(answers.q8)?answers.q8:[];
    const next=cur.includes(k)?cur.filter(v=>v!==k):[...cur,k];
    setAnswers({...answers,q8:next});
  }
  function toggleQ9(k){
    const cur=Array.isArray(answers.q9)?answers.q9:[];
    let next;
    if(k==="none"){
      next=["none"];
    } else {
      const without=cur.filter(v=>v!=="none"&&v!==k);
      next=cur.includes(k)?without:[...without,k];
    }
    setAnswers({...answers,q9:next});
  }
  function toggleQ10(k){
    const cur=Array.isArray(answers.q10)?answers.q10:[];
    const next=cur.includes(k)?cur.filter(v=>v!==k):[...cur,k];
    setAnswers({...answers,q10:next});
  }
  function toggleQ11(k){
    const cur=Array.isArray(answers.q11)?answers.q11:[];
    let next;
    if(k==="none"){
      next=["none"];
    } else {
      const without=cur.filter(v=>v!=="none"&&v!==k);
      next=cur.includes(k)?without:[...without,k];
    }
    setAnswers({...answers,q11:next});
  }
  function handleHeaderClick(){
    if(step==="intro") return;
    if(Object.keys(answers).length>0){
      setPrevStep(step);
      setPrevCurQ(curQ);
      setPrevTypeKey(typeKey);
      setStep("intro");
      setResumeModal(true);
    } else {
      setStep("intro");
    }
  }
  function resumeQuiz(){
    setStep(prevStep||"quiz");
    setCurQ(prevCurQ||0);
    if(prevTypeKey) setTypeKey(prevTypeKey);
    setResumeModal(false);
  }
  function freshStart(){
    setAnswers({});
    setCurQ(0);
    setTypeKey(null);
    setPrevStep(null);
    setPrevCurQ(0);
    setPrevTypeKey(null);
    setResumeModal(false);
    setStep("quiz");
  }
  function confirmMulti(qid){
    const na={...answers};
    const arr=Array.isArray(na[qid])?na[qid]:[];
    if(arr.length===0) return;
    if(curQ<totalQ-1){setCurQ(curQ+1);}
    else{setTypeKey(diagnose(na));setStep("result");}
  }
  function goBack(){if(curQ>0)setCurQ(curQ-1);else setStep("intro");}
  function retry(){setStep("intro");setAnswers({});setCurQ(0);setTypeKey(null);}
  const td=typeKey?TYPES[typeKey]:null;
  return h("div",null,
    resumeModal&&h("div",{className:"modal-overlay",role:"dialog","aria-modal":"true"},
      h("div",{className:"modal-box"},
        h("p",{className:"modal-title"},"前回の診断を再開しますか？"),
        h("p",{className:"modal-desc"},"途中までの回答が残っています。"),
        h("button",{className:"btn-primary",onClick:resumeQuiz},h("span",null,"再開する")),
        h("button",{className:"btn-ghost",onClick:freshStart},"最初からやり直す")
      )
    ),
    h("header",{className:"hdr",onClick:handleHeaderClick,style:{cursor:step!=="intro"?"pointer":"default"}},
      h("p",{className:"hdr-eye"},"Hair Care Diagnosis"),
      h("h1",{className:"hdr-h1"},"Hair Identity")
    ),
    h("main",{className:"wrap"},
      h("h2",{className:"visually-hidden"},"ヘアケア診断アプリ"),
      step==="intro"&&h("div",{className:"fade"},
        h("div",{className:"trust-bar"},
          h(Icon,{name:"shield-check",size:16,color:"var(--gold)"}),
          h("p",{className:"trust-bar-txt"},"この診断では、無理にご購入をおすすめすることはありません。現場での経験をもとに、あなたの髪質に合ったケアをご提案します。")
        ),
        h("p",{className:"sec-label"},"About"),
        h("h2",{className:"sec-title"},"あなたの髪を、\nもっと深く知ってほしい。"),
        h("p",{className:"sec-desc"},
          "11の質問に答えるだけで、髪と頭皮のタイプを診断。",
          h("br",{className:"sp-br"}),
          "プロが厳選したシャンプーをご提案します。",
          h("br",{className:"sp-br"}),
          "所要時間：約2〜3分"
        ),
        h("button",{className:"btn-primary",onClick:startQuiz},h(Icon,{name:"scissors",size:14}),h("span",{style:{marginLeft:".5rem"}},"診断をはじめる")),
        h("div",{className:"profile-top"},
          h("div",{className:"profile-top-photo"},
            h("img",{src:PHOTO_SRC,alt:"橋元リョウイチ"})
          ),
          h("div",{className:"profile-top-info"},
            h("p",{className:"profile-top-name"},"橋元リョウイチ"),
            h("p",{className:"profile-top-role"},"Freelance Hair Stylist"),
            h("a",{className:"profile-top-btn",href:HPB_URL,target:"_blank",rel:"noopener noreferrer"},
              h(Icon,{name:"calendar-check",size:11,color:"#fff"}),
              h("span",{style:{marginLeft:".3rem"}},"ご予約はこちら")
            )
          )
        )
      ),
      step==="quiz"&&h("div",null,
        h("div",{className:"dots"},QUESTIONS.map((_,i)=>h("div",{key:i,className:"dot"+(i===curQ?" active":i<curQ?" done":"")}))),
        h("div",{className:"fade",key:curQ},
          h("p",{className:"q-cat"},QUESTIONS[curQ].cat),
          h("p",{className:"q-num"},`Q${String(curQ+1).padStart(2,"0")} / ${String(totalQ).padStart(2,"0")}`),
          h("p",{className:"q-text"},QUESTIONS[curQ].text),
          QUESTIONS[curQ].id==="q8"&&h("p",{style:{fontSize:".78rem",color:"var(--muted)",marginBottom:".4rem"}},"※ 一番気になる状態から順にタップしてください。"),
          QUESTIONS[curQ].id==="q10"&&h("p",{style:{fontSize:".78rem",color:"var(--muted)",marginBottom:".4rem"}},"※ 一番気になる仕上がりから順にタップしてください。"),
          QUESTIONS[curQ].id==="q11"&&h("p",{className:"q11-hint"},"※ 一番気になる順にタップしてください。"),
          h("div",{className:"opts"},QUESTIONS[curQ].opts.map((opt,optIdx)=>{
            const qid=QUESTIONS[curQ].id;
            const isMulti=qid==="q4"||qid==="q5"||qid==="q7"||qid==="q8"||qid==="q9"||qid==="q10"||qid==="q11";
            const arr=Array.isArray(answers[qid])?answers[qid]:[];
            const isSel=isMulti?arr.includes(opt.k):answers[qid]===opt.k;
            const order=(qid==="q8"||qid==="q10"||qid==="q11")&&isSel?arr.indexOf(opt.k)+1:0;
            const circled=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"];
            return h("button",{key:opt.k,className:"opt"+(isSel?" sel":""),onClick:(e)=>{e.currentTarget.blur();
              qid==="q4"?toggleQ4(opt.k):qid==="q5"?(toggleQ5(opt.k),opt.k==="stable"&&setTimeout(()=>{if(curQ<totalQ-1)setCurQ(curQ+1);else{setTypeKey(diagnose({...answers,q5:["stable"]}));setStep("result");}},280)):qid==="q7"?(toggleQ7(opt.k),opt.k==="none"&&setTimeout(()=>{if(curQ<totalQ-1)setCurQ(curQ+1);else{setTypeKey(diagnose({...answers,q7:["none"]}));setStep("result");}},280)):qid==="q8"?toggleQ8(opt.k):qid==="q9"?(toggleQ9(opt.k),(opt.k==="none"||(opt.k==="other"&&!(Array.isArray(answers.q9)&&answers.q9.length>0)))&&setTimeout(()=>{if(curQ<totalQ-1)setCurQ(curQ+1);else{setTypeKey(diagnose({...answers,q9:[opt.k]}));setStep("result");}},280)):qid==="q10"?toggleQ10(opt.k):qid==="q11"?toggleQ11(opt.k):selectOpt(opt.k);
            }},
              h("span",{className:"opt-lt"},opt.l),
              h("span",{style:{flex:1}},opt.t),
              order>0&&h("span",{style:{marginLeft:"auto",fontSize:"1.15rem",color:"var(--gold)",fontWeight:500,lineHeight:1}},circled[order-1]||`${order}`)
            );
          })),
          (QUESTIONS[curQ].id==="q4"||QUESTIONS[curQ].id==="q5"||QUESTIONS[curQ].id==="q7"||QUESTIONS[curQ].id==="q8"||QUESTIONS[curQ].id==="q9"||QUESTIONS[curQ].id==="q10"||QUESTIONS[curQ].id==="q11")&&h("button",{
            className:"btn-primary",
            style:{marginTop:"1rem",opacity:(Array.isArray(answers[QUESTIONS[curQ].id])&&answers[QUESTIONS[curQ].id].length>0)?1:0.4},
            disabled:!(Array.isArray(answers[QUESTIONS[curQ].id])&&answers[QUESTIONS[curQ].id].length>0),
            onClick:()=>confirmMulti(QUESTIONS[curQ].id)
          },"次へ →")
        ),
        h("button",{className:"btn-ghost",onClick:goBack},"← 前の質問に戻る")
      ),
      step==="loading"&&h("div",{className:"loading"},h("div",{className:"spin"}),h("p",{className:"loading-txt"},"髪質を分析しています…")),
      step==="result"&&td&&h("div",{className:"fade"},
        CHAR_IMG[typeKey]&&h("img",{src:CHAR_IMG[typeKey],alt:td.title,className:"char-img",loading:"lazy"}),
        h("span",{className:"badge"},td.badge),
        h("h2",{className:"res-title"},td.title),
        h("p",{className:"res-sub"},td.sub),
        td.alert&&h("div",{className:"alert-box"},td.alert),
        h("div",{className:"summary-box"},
          h("p",{className:"summary-lbl"},h(Icon,{name:"feather",size:11,color:"var(--gold)"}),h("span",null,"あなたの回答から")),
          h("p",{className:"summary-txt"},buildResultSummary(typeKey,answers))
        ),
        h("hr",{className:"divider"}),
        h("div",{className:"ai-box"},
          h("p",{className:"ai-lbl"},h(Icon,{name:"sparkles",size:11,color:"var(--gold)"}),h("span",null,"Hair Advice — Ryoichi Hashimoto")),
          td.advice.map((txt,i)=>{
            const isNote=txt.startsWith("※");
            return h("p",{key:i,className:"ai-txt",style:{marginBottom:i<td.advice.length-1?".9rem":"0",paddingLeft:"0",...(isNote?{fontSize:".76rem",color:"var(--muted)",borderTop:"1px solid var(--border)",paddingTop:".75rem",marginTop:".25rem"}:{})}},
              isNote?txt:h(React.Fragment,null,h("span",{style:{color:"var(--gold)",fontFamily:"var(--serif)",fontStyle:"italic",marginRight:".4rem"}},`${i+1}.`),txt)
            );
          })
        ),
        (typeKey==="oil_reset_short"||typeKey==="oil_reset_long")&&(Array.isArray(answers.q5)?answers.q5:[answers.q5||"stable"]).some(v=>v==="clear"||v==="strong")&&(Array.isArray(answers.q10)?answers.q10.includes("volume"):answers.q10==="volume")&&h("div",{className:"alert-box",style:{background:"#fdf8f0",borderColor:"var(--gold-l)",color:"var(--gold-d)",marginTop:"1.2rem"}},"※ ボリュームアップの実感が得られない場合は、エイジングケア（Vital Aging）もご検討ください。"),
        ((answers.q1==="oily"||answers.q1==="mix")&&typeKey==="repair_mode"||answers.q1==="oily"&&typeKey==="bare_skin")&&h("div",{className:"alert-box",style:{background:"#fdf8f0",borderColor:"var(--gold-l)",color:"var(--gold-d)",marginTop:"1.2rem"}},"※ 地肌は脂性・混合傾向があります。シャンプー後はシャワーでしっかりすすいでください。"),
        h("button",{className:"btn-primary btn-primary-lg",onClick:()=>setStep("products")},h("span",null,"おすすめのシャンプーを見る ↗")),
        h("button",{className:"btn-ghost",onClick:retry},"もう一度診断する"),
        h("p",{style:{fontSize:".72rem",color:"var(--muted)",textAlign:"center",marginTop:".8rem",lineHeight:"1.6"}},"スクショで記録しておくと便利です")
      ),
      step==="products"&&td&&h("div",{className:"fade"},
        CHAR_IMG[typeKey]&&h("img",{src:CHAR_IMG[typeKey],alt:td.title,className:"char-img",loading:"lazy"}),
        h("span",{className:"badge"},td.badge),
        h("h2",{className:"res-title"},td.title),
        h("p",{className:"res-sub"},td.sub),
        h("hr",{className:"divider"}),
        h("p",{className:"prod-sub",style:{marginBottom:"1.3rem"}},"タイプ別に厳選したアイテムです。あなたの回答との相性が高い順に並んでいます。"),
        td.alert&&h("div",{className:"alert-box"},td.alert),
        [...td.products].filter(p=>{
          if(p.name.includes("イオ クレンジング")){
            if(answers.q1!=="dry") return false;
          }
          return true;
        }).sort((a,b)=>scoreProduct(b,answers)-scoreProduct(a,answers)).map((p,i)=>renderProdCard(p,"main_"+i)),
        (()=>{
          const sec=findSecondarySection(typeKey,answers);
          if(!sec||sec.products.length===0) return null;
          return h("div",{style:{marginTop:"2rem",paddingTop:"1.5rem",borderTop:"1px dashed var(--border)"}},
            h("p",{style:{fontSize:".58rem",letterSpacing:".18em",textTransform:"uppercase",color:"var(--gold)",marginBottom:".4rem"}},"Optional"),
            h("p",{style:{fontFamily:"var(--serif)",fontSize:"1.05rem",fontWeight:300,color:"var(--char)",marginBottom:".3rem",lineHeight:"1.4"}},sec.label),
            h("p",{style:{fontSize:".73rem",color:"var(--muted)",marginBottom:"1rem",lineHeight:"1.6"}},sec.desc),
            sec.products.map((p,i)=>renderProdCard(p,"sec_"+i))
          );
        })(),
        (()=>{
          const q5arr=Array.isArray(answers.q5)?answers.q5:(answers.q5?[answers.q5]:[]);
          if(!q5arr.includes("clear")||typeKey==="vital_aging") return null;
          const vaProds=[TYPES.vital_aging.products.find(p=>p.name.includes("セグレタ シャンプー")),TYPES.vital_aging.products.find(p=>p.name.includes("PRORY"))].filter(Boolean);
          if(vaProds.length===0) return null;
          return h("div",{style:{marginTop:"2rem",paddingTop:"1.5rem",borderTop:"1px dashed var(--border)"}},
            h("p",{style:{fontSize:".58rem",letterSpacing:".18em",textTransform:"uppercase",color:"var(--gold)",marginBottom:".4rem"}},"Optional"),
            h("p",{style:{fontFamily:"var(--serif)",fontSize:"1.05rem",fontWeight:300,color:"var(--char)",marginBottom:".3rem",lineHeight:"1.4"}},"ハリ・コシが気になり始めたら"),
            h("p",{style:{fontSize:".73rem",color:"var(--muted)",marginBottom:"1rem",lineHeight:"1.6"}},"使っているうちに、髪のボリューム感の変化を感じたときはこちらも選択肢に。"),
            vaProds.map((p,i)=>renderProdCard(p,"va_"+i))
          );
        })(),
        (()=>{
          const q11arr=Array.isArray(answers.q11)?answers.q11:(answers.q11?[answers.q11]:[]);
          const q4arr=Array.isArray(answers.q4)?answers.q4:(answers.q4?[answers.q4]:[]);
          if(!(q11arr.includes("volume")&&q4arr.includes("less"))) return null;
          const findP=(tk,kw)=>TYPES[tk]&&TYPES[tk].products.find(p=>p.name.includes(kw));
          const volProds=[
            findP("vital_aging","セグレタ シャンプー"),
            findP("vital_aging","バウンシーボリューム")
          ].filter(Boolean);
          if(volProds.length===0) return null;
          return h("div",{style:{marginTop:"2rem",paddingTop:"1.5rem",borderTop:"1px dashed var(--border)"}},
            h("p",{style:{fontSize:".58rem",letterSpacing:".18em",textTransform:"uppercase",color:"var(--gold)",marginBottom:".4rem"}},"For Volume"),
            h("p",{style:{fontFamily:"var(--serif)",fontSize:"1.05rem",fontWeight:300,color:"var(--char)",marginBottom:".3rem",lineHeight:"1.4"}},"ボリュームアップをお望みの方へ"),
            h("p",{style:{fontSize:".73rem",color:"var(--muted)",marginBottom:"1rem",lineHeight:"1.6"}},"※ シャンプーで髪の本数を増やすことはできません。根元から立ち上がる仕上がりをサポートするアイテムです。"),
            volProds.map((p,i)=>renderProdCard(p,"vol_"+i))
          );
        })(),
        (()=>{
          const q11arr=Array.isArray(answers.q11)?answers.q11:(answers.q11?[answers.q11]:[]);
          if(!q11arr.includes("gray")) return null;
          return h("div",{className:"alert-box",style:{marginTop:"1.5rem",background:"#fdf8f0",borderColor:"var(--gold-l)",color:"var(--gold-d)"}},"※ 掲載中のシャンプーに染色効果はありません。白髪染めはサロンメニューをご検討ください。");
        })(),
        h("div",{className:"consult-bar"},
          h("div",{className:"consult-bar-txt"},
            h("p",{className:"consult-bar-ttl"},"どれを選べばいいか迷ったら"),
            h("p",{className:"consult-bar-sub"},"カットやカラーをしながら、あなたの髪を直接見てご提案します。")
          ),
          h("a",{className:"consult-bar-btn",href:HPB_URL,target:"_blank",rel:"noopener noreferrer"},h(Icon,{name:"message-circle",size:13,color:"#fff"}),h("span",{style:{marginLeft:".35rem"}},"サロンで相談する"))
        ),
        h(SurfactantChart,{typeKey}),
        h("button",{className:"btn-ghost",style:{marginTop:"1.5rem"},onClick:retry},"← もう一度診断する")
      )
    ),
    (step==="result"||step==="products")&&h("footer",{className:"ftr"},
      h("div",{className:"ftr-profile"},
        h("div",{className:"ftr-photo-wrap"},
          h("img",{src:PHOTO_SRC,alt:"橋元リョウイチ",className:"ftr-photo",onError:e=>{e.target.style.display="none";e.target.nextSibling.style.display="flex";}}),
          h("div",{className:"ftr-photo-fallback"},h(Icon,{name:"user",size:32,color:"var(--gold-l)"}))
        ),
        h("div",{className:"ftr-profile-info"},
          h("p",{className:"ftr-profile-label"},"カットやカラーの時間こそ、髪のお悩みを解く一番のチャンス。施術しながら、あなたに本当に合うケアを一緒に見つけていきましょう。"),
          h("p",{className:"ftr-name"},"橋元 リョウイチ"),
          h("p",{className:"ftr-salon"},"Freelance Hair Stylist"),
          h("a",{className:"ftr-rsv-btn",href:HPB_URL,target:"_blank",rel:"noopener noreferrer"},h(Icon,{name:"calendar-check",size:13,color:"#fff"}),h("span",{style:{marginLeft:".35rem"}},"ご予約はこちら"))
        )
      ),
      h("p",{className:"ftr-note"},"このサイトはAmazonアソシエイト・楽天アフィリエイトプログラムに参加しています。\n掲載リンクから商品を購入された場合、紹介料を受け取る場合があります。\n診断結果はあくまで参考情報です。頭皮の症状が続く場合は皮膚科を受診してください。")
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
