:root {
  --cream: #fdfbf8;
  --warm: #9a8478;
  --warm-dark: #6e5f55;
  --gold: #c9a84c;
  --slate: #3a3530;
  --light: #f4f0ec;
  --border: #e8e0d8;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  color: var(--slate);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(154,132,120,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 2rem;
  box-shadow: 0 8px 48px rgba(58,53,48,0.10);
  overflow: hidden;
  min-height: 580px;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  position: relative;
}

/* ===== START ===== */
.screen { display: none; flex-direction: column; flex-grow: 1; }
.screen.active { display: flex; }

#screen-start {
  align-items: center;
  justify-content: center;
  padding: 3rem 2.5rem;
  text-align: center;
}

.logo-ring {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.5rem;
  background: var(--light);
  position: relative;
}
.logo-ring::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 1px dashed var(--border);
  animation: spin 20s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.logo-icon { font-size: 2rem; }

h1.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 300;
  letter-spacing: 0.08em;
  margin-bottom: 0.25rem;
  color: var(--slate);
}
.brand-sub {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.5rem;
}
.start-desc {
  font-size: 0.8rem;
  color: #888;
  line-height: 1.9;
  margin-bottom: 2.5rem;
}

.btn-primary {
  width: 100%;
  padding: 1rem;
  background: var(--slate);
  color: #fff;
  border: none;
  border-radius: 999px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn-primary:hover { background: var(--warm-dark); }
.btn-primary:active { transform: scale(0.98); }

/* ===== QUIZ ===== */
#screen-quiz { padding: 2rem; }

.quiz-header {
  display: flex;
  align-items: center;
  margin-bottom: 2rem;
  gap: 1rem;
}
.back-btn {
  background: none; border: none; cursor: pointer;
  color: #ccc; font-size: 1.2rem; padding: 0.2rem;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--warm); }

.progress-dots {
  display: flex; gap: 6px; flex-grow: 1; justify-content: center;
}
.dot {
  height: 4px; width: 28px; border-radius: 999px;
  background: var(--light);
  transition: background 0.3s;
}
.dot.active { background: var(--warm); }

.q-category {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 0.5rem;
}
.q-text {
  font-size: 1rem;
  font-weight: 500;
  line-height: 1.7;
  margin-bottom: 1.5rem;
}

.options { display: flex; flex-direction: column; gap: 0.75rem; flex-grow: 1; }

.option-btn {
  width: 100%;
  padding: 1rem 1.2rem;
  text-align: left;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.2s, background 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
}
.option-btn:hover {
  border-color: var(--warm);
  background: var(--light);
}
.option-text { font-size: 0.82rem; color: var(--slate); }
.option-arrow { color: #ddd; font-size: 0.9rem; transition: color 0.2s; }
.option-btn:hover .option-arrow { color: var(--warm); }

/* ===== LOADING ===== */
#screen-loading {
  align-items: center; justify-content: center;
  padding: 3rem;
  text-align: center;
}
.spinner {
  width: 48px; height: 48px;
  border: 2px solid var(--border);
  border-top-color: var(--warm);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 1.5rem;
}
.loading-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: #aaa;
}

/* ===== RESULT ===== */
#screen-result { padding: 2rem; overflow-y: auto; }

.result-header { text-align: center; margin-bottom: 1.5rem; }
.result-badge {
  display: inline-block;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 0.3rem 0.8rem;
  border-radius: 999px;
  margin-bottom: 0.6rem;
}
.badge-purple { background: #f3f0ff; color: #7c5cbf; }
.badge-red    { background: #fff0f0; color: #c0392b; }
.badge-indigo { background: #eef2ff; color: #4f46e5; }

.result-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--slate);
}

.advice-box {
  background: #f0f4ff;
  border: 1px solid #d8e0ff;
  border-radius: 1rem;
  padding: 1rem;
  margin-bottom: 1rem;
}
.advice-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #6366f1;
  margin-bottom: 0.4rem;
}
.advice-text {
  font-size: 0.78rem;
  line-height: 1.8;
  color: #3730a3;
}

.product-box {
  background: var(--light);
  border-radius: 1rem;
  padding: 1.2rem;
  margin-bottom: 1.5rem;
}
.product-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
.product-icon {
  width: 40px; height: 40px;
  background: #fff;
  border-radius: 0.75rem;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.product-label { font-size: 0.6rem; font-weight: 700; color: #aaa; letter-spacing: 0.15em; text-transform: uppercase; }
.product-name { font-size: 0.9rem; font-weight: 500; color: var(--slate); }
.product-desc { font-size: 0.75rem; color: #777; line-height: 1.7; margin-bottom: 1rem; }

.btn-amazon {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  width: 100%;
  padding: 0.85rem;
  background: var(--slate);
  color: #fff;
  border: none;
  border-radius: 0.75rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s;
}
.btn-amazon:hover { background: var(--warm-dark); }

/* チャット */
.chat-box {
  border: 1px solid var(--border);
  border-radius: 1rem;
  overflow: hidden;
  margin-bottom: 1rem;
}
.chat-messages {
  height: 120px;
  overflow-y: auto;
  padding: 0.75rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  background: #fafafa;
}
.chat-empty { font-size: 0.7rem; color: #ccc; text-align: center; margin-top: 2rem; font-style: italic; }
.msg { display: flex; }
.msg.user { justify-content: flex-end; }
.msg-bubble {
  max-width: 80%;
  padding: 0.5rem 0.75rem;
  border-radius: 0.75rem;
  font-size: 0.72rem;
  line-height: 1.6;
}
.msg.user .msg-bubble { background: var(--warm); color: #fff; }
.msg.bot  .msg-bubble { background: #eee; color: var(--slate); }

.chat-input-row {
  display: flex;
  border-top: 1px solid var(--border);
  background: #fff;
}
.chat-input {
  flex-grow: 1;
  border: none;
  outline: none;
  padding: 0.7rem 1rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.75rem;
  background: transparent;
}
.chat-send {
  padding: 0.7rem 1rem;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--warm);
  font-size: 1rem;
  transition: color 0.2s;
}
.chat-send:hover { color: var(--warm-dark); }

.restart-btn {
  background: none; border: none; cursor: pointer;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #ccc;
  width: 100%;
  padding: 0.5rem;
  transition: color 0.2s;
}
.restart-btn:hover { color: var(--warm); }

/* フェードイン */
.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

<div class="card">

  <!-- START -->

  <div id="screen-start" class="screen active fade-in">

<script>
  // ===== 設定 =====
  // ★ Gemini APIキーをここに入力してください
  const GEMINI_API_KEY = "";

  const questions = [
    {
      id: 'scalp',
      category: 'Scalp Environment',
      text: '頭皮の「地肌の状態」に最も近いものは？',
      options: [
        { text: '乾燥しやすく、カサつきやフケが気になる', value: 'dry' },
        { text: '夕方にはベタつきやニオイが気になる', value: 'oily' },
        { text: 'Tゾーンはベタつくが、他は乾燥する', value: 'mixed' },
        { text: '赤みや湿疹、かゆみがある', value: 'sensitive' }
      ]
    },
    {
      id: 'damage',
      category: 'Damage Level',
      text: '現在の「ダメージ状態」を教えてください',
      options: [
        { text: 'レベル0：ほぼダメージなし（バージン毛）', value: 0 },
        { text: 'レベル2：カラーでパサつきを感じる', value: 2 },
        { text: 'レベル4：ブリーチ・枝毛がある', value: 4 },
        { text: 'レベル6：深刻な傷みがある', value: 6 }
      ]
    },
    {
      id: 'goal',
      category: 'Ideal Finish',
      text: 'どのような「仕上がり」を求めていますか？',
      options: [
        { text: 'しっとり・重めのまとまり感', value: 'moist' },
        { text: 'サラサラ・軽やかな指通り', value: 'smooth' }
      ]
    }
  ];

  // ===== シャンプーデータ（Amazon アフィリエイトリンクを後で設定） =====
  // ★ link の部分を Amazonアソシエイトのリンクに差し替えてください
  const results = {
    sensitive: {
      name: 'レッド・セーフティ',
      badge: 'SENSITIVE',
      badgeClass: 'badge-red',
      shampoo: 'ミノン 全身シャンプー',
      desc: '敏感な地肌に最適。低刺激アミノ酸処方で、赤みやかゆみをケアしながら優しく洗い上げます。',
      link: 'https://www.amazon.co.jp/'
    },
    highDamage: {
      name: 'リバイブ・アルケミスト',
      badge: 'HIGH DAMAGE',
      badgeClass: 'badge-indigo',
      shampoo: 'ミルボン オージュア イミュライズ',
      desc: 'ダメージが深刻な髪に。毛髪内部を集中補修し、枝毛・切れ毛を防ぎながら芯から強い髪へ導きます。',
      link: 'https://www.amazon.co.jp/'
    },
    default: {
      name: 'スタンダード・ケア',
      badge: 'BALANCED',
      badgeClass: 'badge-purple',
      shampoo: 'ミルボン オージュア クエンチ',
      desc: '季節の変わり目に乾燥しやすい髪に。保湿成分とアミノ酸の力で、しなやかでまとまりやすい髪へ。',
      link: 'https://www.amazon.co.jp/'
    }
  };

  // ===== 状態 =====
  let currentQ = 0;
  let answers = {};
  let currentResult = null;

  // ===== 画面切替 =====
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(id);
    el.classList.add('active', 'fade-in');
    setTimeout(() => el.classList.remove('fade-in'), 500);
  }

  // ===== クイズ =====
  function startQuiz() {
    currentQ = 0;
    answers = {};
    renderQuestion();
    showScreen('screen-quiz');
  }

  function renderQuestion() {
    const q = questions[currentQ];
    document.getElementById('q-category').textContent = q.category;
    document.getElementById('q-text').textContent = q.text;

    // プログレスドット
    const dots = document.getElementById('progress-dots');
    dots.innerHTML = questions.map((_, i) =>
      `<div class="dot ${i <= currentQ ? 'active' : ''}"></div>`
    ).join('');

    // 選択肢
    const opts = document.getElementById('options');
    opts.innerHTML = q.options.map(opt =>
      `<button class="option-btn" onclick="handleAnswer(${JSON.stringify(opt.value)})">
        <span class="option-text">${opt.text}</span>
        <span class="option-arrow">›</span>
      </button>`
    ).join('');
  }

  function goBack() {
    if (currentQ > 0) { currentQ--; renderQuestion(); }
    else showScreen('screen-start');
  }

  function handleAnswer(val) {
    answers[questions[currentQ].id] = val;
    if (currentQ < questions.length - 1) {
      currentQ++;
      renderQuestion();
    } else {
      showScreen('screen-loading');
      setTimeout(showResult, 1500);
    }
  }

  // ===== 診断結果 =====
  function showResult() {
    const { scalp, damage } = answers;
    let r;
    if (scalp === 'sensitive') r = results.sensitive;
    else if (damage >= 4)      r = results.highDamage;
    else                       r = results.default;

    currentResult = r;

    const badge = document.getElementById('result-badge');
    badge.textContent = r.badge;
    badge.className = 'result-badge ' + r.badgeClass;

    document.getElementById('result-name').textContent = r.name;
    document.getElementById('product-name').textContent = r.shampoo;
    document.getElementById('product-desc').textContent = r.desc;
    document.getElementById('product-link').href = r.link;
    document.getElementById('advice-text').textContent = '解析中...';

    showScreen('screen-result');
    generateAdvice(r);
  }

  // ===== Gemini API =====
  async function callGemini(prompt, system = "", retry = 0) {
    if (!GEMINI_API_KEY) {
      return "プロの美容師として：このシャンプーは週3〜4回の使用がおすすめです。洗い流しは念入りに、コンディショナーと組み合わせるとより効果的です。";
    }
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: system }] }
          })
        }
      );
      if (res.status === 429 && retry < 4) {
        await new Promise(r => setTimeout(r, Math.pow(2, retry) * 1000));
        return callGemini(prompt, system, retry + 1);
      }
      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || "アドバイスを生成できませんでした。";
    } catch(e) {
      return "通信エラーが発生しました。";
    }
  }

  async function generateAdvice(r) {
    const advice = await callGemini(
      `診断結果: ${r.name}、推奨シャンプー: ${r.shampoo}。地肌: ${answers.scalp}、ダメージ: ${answers.damage}`,
      "あなたはプロの美容師です。この診断結果に基づき、お客様へのシャンプー使用アドバイスを100〜130文字程度の日本語で、丁寧かつ親しみやすいトーンで書いてください。"
    );
    document.getElementById('advice-text').textContent = advice;
  }

  // ===== チャット =====
  let chatHistory = [];

  async function sendChat() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    addMessage('user', text);
    chatHistory.push({ role: 'user', text });

    const reply = await callGemini(
      text,
      `あなたはプロの美容師です。診断結果は「${currentResult?.name}」、推奨シャンプーは「${currentResult?.shampoo}」です。お客様の質問に100文字程度で丁寧に答えてください。`
    );
    addMessage('bot', reply);
    chatHistory.push({ role: 'bot', text: reply });
  }

  function addMessage(role, text) {
    const container = document.getElementById('chat-messages');
    const empty = container.querySelector('.chat-empty');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="msg-bubble">${text}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }
</script>
